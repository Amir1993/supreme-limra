.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sc{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 6px rgba(15,32,64,.06)}
.sl{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--mu);margin-bottom:6px}
.sv{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--tx);line-height:1}
.stt{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--tx);margin-bottom:10px}

// STORAGE & AUTH
// ════════════════════════════════════════════════════
// ── Unified DB: Firebase + localStorage fallback ─────────────────────────
const DB={
  // ── localStorage helpers ──
  lget:(k,d=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  lset:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}},

  // ── Auth ──
  isAuth(){
    if(FB_READY && _fbAuth) return !!_fbAuth.currentUser;
    return sessionStorage.getItem('slimra_auth')==='1';
  },
  async loginUser(pin){
    if(FB_READY && _fbAuth){
      // Firebase is ready — authenticate with email + password
      try{
        await _fbAuth.signInWithEmailAndPassword(SOCIETY_EMAIL, pin);
        sessionStorage.setItem('slimra_auth','1');
        return {ok:true};
      }catch(e){
        if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')
          return {ok:false, msg:'Wrong password. Use the password you set in Firebase.'};
        if(e.code==='auth/user-not-found')
          return {ok:false, msg:'User not found. Check Firebase Auth setup.'};
        return {ok:false, msg:'Login error: '+e.message};
      }
    }
    if(FB_READY && !_fbAuth){
      // Firebase config set but SDK still loading — wait and retry once
      await new Promise(r=>setTimeout(r,1200));
      if(_fbAuth){
        try{
          await _fbAuth.signInWithEmailAndPassword(SOCIETY_EMAIL, pin);
          sessionStorage.setItem('slimra_auth','1');
          return {ok:true};
        }catch(e){
          return {ok:false, msg:'Wrong password'};
        }
      }
    }
    // Local-only fallback (no Firebase config or SDK unavailable)
    if(pin===(localStorage.getItem('slimra_pin')||'1234')){
      sessionStorage.setItem('slimra_auth','1');
      return {ok:true, local:true};
    }
    return {ok:false, msg:'Wrong PIN. Default is 1234'};
  },
  logout(){
    sessionStorage.removeItem('slimra_auth');
    if(FB_READY && _fbAuth) _fbAuth.signOut().catch(()=>{});
  },

  // ── PIN (local-only mode) ──
  getPin:()=>localStorage.getItem('slimra_pin')||'1234',
  setPin:(v)=>localStorage.setItem('slimra_pin',v),

  // ── Load data (Firebase first, then localStorage cache) ──
  async load(){
    if(FB_READY && _fbFS && this.isAuth()){
      try{
        const [fd, bd] = await Promise.all([
          _fbFS.collection('society').doc('flats').get(),
          _fbFS.collection('society').doc('bills').get()
        ]);
        const flats = fd.exists ? fd.data().list : null;
        const bills = bd.exists ? bd.data().list : null;
        if(flats){ this.lset('slimra_flats_v3', flats); }
        if(bills){ this.lset('slimra_bills_v2', bills); }
        return {
          flats: flats || this.lget('slimra_flats_v3') || JSON.parse(JSON.stringify(INIT_FLATS)),
          bills: bills || this.lget('slimra_bills_v2') || [],
          source: 'firebase'
        };
      }catch(e){
        console.log('Firebase load failed, using cache:', e);
      }
    }
    return {
      flats: this.lget('slimra_flats_v3') || JSON.parse(JSON.stringify(INIT_FLATS)),
      bills: this.lget('slimra_bills_v2') || [],
      source: 'local'
    };
  },

  // ── Save flats (localStorage immediately + Firebase in background) ──
  saveFlats(flats){
    this.lset('slimra_flats_v3', flats);
    if(FB_READY && _fbFS && this.isAuth()){
      _fbFS.collection('society').doc('flats')
        .set({list:flats, updated:new Date().toISOString()})
        .catch(e=>console.log('Flats sync failed:',e));
    }
  },
  // ── Save bills ──
  saveBills(bills){
    this.lset('slimra_bills_v2', bills);
    if(FB_READY && _fbFS && this.isAuth()){
      _fbFS.collection('society').doc('bills')
        .set({list:bills, updated:new Date().toISOString()})
        .catch(e=>console.log('Bills sync failed:',e));
    }
  },
  // ── Subscribe to real-time changes (called once after login) ──
  subscribeChanges(onFlats, onBills){
    if(!FB_READY || !_fbFS) return;
    _fbFS.collection('society').doc('flats').onSnapshot(snap=>{
      if(snap.exists){const d=snap.data().list;this.lset('slimra_flats_v3',d);onFlats(d);}
    });
    _fbFS.collection('society').doc('bills').onSnapshot(snap=>{
      if(snap.exists){const d=snap.data().list;this.lset('slimra_bills_v2',d);onBills(d);}
    });
  }
};

function numToWords(n){
  if(!n)return'Zero Only';
  const o=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const t=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function c(x){if(x<20)return o[x];if(x<100)return t[Math.floor(x/10)]+(x%10?' '+o[x%10]:'');if(x<1000)return o[Math.floor(x/100)]+' Hundred'+(x%100?' '+c(x%100):'');if(x<100000)return c(Math.floor(x/1000))+' Thousand'+(x%1000?' '+c(x%1000):'');if(x<10000000)return c(Math.floor(x/100000))+' Lakh'+(x%100000?' '+c(x%100000):'');return c(Math.floor(x/10000000))+' Crore'+(x%10000000?' '+c(x%10000000):'');}
  return c(n)+' Only';
}

  y+=24;

  // Table
  const colW=[30,80,35,35]; // Month, Status, Amount, Receipt
  const headers=['Month','Status','Amount','Receipt No.'];
  
  // Header row
  doc.setFillColor(15,32,64);
  doc.rect(mx,y,rw,9,'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(9);
  doc.setTextColor(255,255,255);
  let cx=mx;
  headers.forEach((h,i)=>{
    doc.text(h,cx+colW[i]/2,y+6.5,{align:'center'});
    cx+=colW[i];
  });
  y+=9;

  let totalPaid=0, totalPending=0;
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  
  months.forEach((month,mi)=>{
    const bill=bills.find(b=>b.flatId===flat.id&&b.month===mi+1&&b.year===year);
    const paid=bill&&bill.status==='paid';
    const rowH=9;

    // Alternating row
    if(mi%2===0){ doc.setFillColor(252,250,246); doc.rect(mx,y,rw,rowH,'F'); }
    
    doc.setDrawColor(220,215,205);
    doc.setLineWidth(0.2);
    cx=mx;
    colW.forEach(w=>{ doc.rect(cx,y,w,rowH); cx+=w; });

    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(30,30,30);
    doc.text(month+' '+year, mx+colW[0]/2, y+6, {align:'center'});

    if(!bill){
      doc.setTextColor(150,150,150);
      doc.text('Not Generated', mx+colW[0]+colW[1]/2, y+6, {align:'center'});
      doc.setTextColor(150,150,150);
      doc.text('—', mx+colW[0]+colW[1]+colW[2]/2, y+6, {align:'center'});
      doc.text('—', mx+colW[0]+colW[1]+colW[2]+colW[3]/2, y+6, {align:'center'});
    } else if(paid){
      doc.setTextColor(26,127,55);
      doc.setFont('helvetica','bold');
      doc.text('PAID', mx+colW[0]+colW[1]/2, y+6, {align:'center'});
      doc.setFont('helvetica','normal');
      doc.setTextColor(26,127,55);
      doc.text('Rs.'+bill.amount+'/-', mx+colW[0]+colW[1]+colW[2]/2, y+6, {align:'center'});
      doc.setTextColor(80,80,80);
      doc.text('#'+bill.receiptNo, mx+colW[0]+colW[1]+colW[2]+colW[3]/2, y+6, {align:'center'});
      totalPaid+=bill.amount;
    } else {
      doc.setFillColor(255,245,245);
      doc.rect(mx,y,rw,rowH,'F');
      cx=mx; colW.forEach(w=>{ doc.rect(cx,y,w,rowH); cx+=w; });

      totalPending+=bill.amount;

    y+=rowH;

  // Summary row
  y+=2;
  doc.setFillColor(15,32,64);
  doc.rect(mx,y,rw,12,'F');

  doc.setFontSize(10);

  doc.setFontSize(8);

  return doc;
}

  doc.setDrawColor(220,215,205);
  doc.rect(mx,y,rw,9);
  doc.setFont('helvetica','normal');
  doc.setFontSize(8.5);
  doc.setTextColor(80,80,80);
  doc.text('Rs. in words: ',mx+3,y+6);
  const wlw=doc.getTextWidth('Rs. in words: ');
  doc.setFont('helvetica','bold');
  doc.setTextColor(0,0,0);
  doc.text(numToWords(bill.amount),mx+3+wlw,y+6);
  y+=11;

  // ── Payment Mode ────────────────────────────────────────────
  if(bill.paymentMode){
    doc.setFont('helvetica','normal');
    doc.setFontSize(8.5);
    doc.setTextColor(80,80,80);
    doc.text('Payment Mode: ',mx+3,y);
    const pmw=doc.getTextWidth('Payment Mode: ');
    doc.setFont('helvetica','bold');
    doc.setTextColor(0,0,0);
    doc.text(bill.paymentMode,mx+3+pmw,y);
    y+=6;
  }

  // ── Computer Generated footer ────────────────────────────────
  doc.setFillColor(201,147,42);
  doc.rect(mx,y,rw,0.6,'F');
  y+=4;
  doc.setFont('helvetica','italic');
  doc.setFontSize(7.5);
  doc.setTextColor(120,100,60);
  doc.text('This is a computer generated receipt. No signature required.',W/2,y,{align:'center'});
  y+=4;
  doc.setFont('helvetica','normal');
  doc.setFontSize(7);
  doc.setTextColor(150,150,150);
  doc.text('Supreme Limra Society Management — '+new Date().getFullYear(),W/2,y,{align:'center'});

  // ── PAID diagonal stamp ──────────────────────────────────────
  doc.saveGraphicsState();
  doc.setGState(new doc.GState({opacity:0.12}));
  doc.setFont('helvetica','bold');
  doc.setFontSize(52);
  doc.setTextColor(26,127,55);
  // Rotate text 45 degrees around center of page
  doc.text('PAID',W/2,110,{align:'center',angle:45});
  doc.restoreGraphicsState();

  return doc;
}

// ════════════════════════════════════════════════════
// UPLOAD PDF TO FIREBASE STORAGE → GET SHARE LINK
// ════════════════════════════════════════════════════
async function uploadReceiptAndGetLink(bill, flat){
  if(!FB_READY || !_fbST){
    console.log('Firebase Storage not ready');
    return null;
  }
  try{
    showToast('Generating PDF…','wa');
    const loaded = await ensureJsPDF();
    if(!loaded){ showToast('jsPDF not loaded','err'); return null; }

    const doc = buildReceiptPDF(bill, flat);
    if(!doc) return null;

    const blob = doc.output('blob');
    const fname = 'receipts/Receipt_'+bill.receiptNo
                  +'_Flat'+flat.flatNo.replace(/\//g,'_')
                  +'_'+Date.now()+'.pdf';

    showToast('Uploading to cloud…','wa');

    const ref = _fbST.ref(fname);
    const snapshot = await ref.put(blob, {
      contentType: 'application/pdf',
      customMetadata: { flat: flat.flatNo, receipt: bill.receiptNo }
    });

    showToast('Getting download link…','wa');
    const url = await ref.getDownloadURL();
    console.log('Upload success:', url);
    return url;

  }catch(e){
    console.log('Upload error:', e.code, e.message);
    // Show specific error message
    if(e.code === 'storage/unauthorized'){
      showToast('Storage rules not set — update Firebase Rules!','err');
    } else if(e.code === 'storage/unknown'){
      showToast('Storage error — check internet','err');
    } else {
      showToast('Upload failed: '+e.message,'err');
    }
    return null;
  }
}

// Dynamically load jsPDF if not yet available
function ensureJsPDF(){
  return new Promise(resolve=>{
    if(window.jspdf){resolve(true);return;}
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=()=>resolve(true);
    s.onerror=()=>resolve(false);
    document.head.appendChild(s);
  });
}

// ════════════════════════════════════════════════════
// PDF GENERATION (Blob URL — works in ALL browsers)
// ════════════════════════════════════════════════════
function printPDF(bill, flat){
  // Use jsPDF colored receipt (same as what gets uploaded to Firebase)
  ensureJsPDF().then(loaded=>{
    if(!loaded){ showToast('PDF library not loaded — check internet','err'); return; }
    const doc = buildReceiptPDF(bill, flat);
    if(!doc){ showToast('Could not generate PDF','err'); return; }

    // On mobile: save/download the PDF
    // On desktop: open in new tab for printing
    const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
    if(isMobile){
      // Save as file — user can then open & print from Files app
      doc.save('Receipt_'+bill.receiptNo+'_Flat'+flat.flatNo.replace('/','_')+'.pdf');
      showToast('PDF saved to Downloads ✓','ok');
    } else {
      // Open in new browser tab for desktop printing
      const blob = doc.output('blob');
      const url = URL.createObjectURL(blob);
      const win = window.open(url, '_blank');
      if(win){
        setTimeout(()=>{ try{URL.revokeObjectURL(url);}catch(e){} }, 60000);
      } else {
        // Popup blocked — fallback to download
        doc.save('Receipt_'+bill.receiptNo+'_Flat'+flat.flatNo.replace('/','_')+'.pdf');
        showToast('PDF downloaded — open to print','ok');
      }
    }
  });
}

// Direct WhatsApp to specific contact

//   - Opens WhatsApp directly to that contact's chat
//   - Message pre-filled, user just taps Send
//   - Cannot be blocked (page navigation, not popup)
// ════════════════════════════════════════════════════
function goToWA(mobile, msg){
  const n = mobile.replace(/\D/g,'');
  const phone = n.startsWith('91') ? n : '91'+n;
  window.location.href = 'https://wa.me/'+phone+'?text='+encodeURIComponent(msg);
}

function openWA(mobile, msg){
  const n = mobile.replace(/\D/g,'');
  const phone = n.startsWith('91') ? n : '91'+n;
  const url = 'https://wa.me/'+phone+'?text='+encodeURIComponent(msg);
  window.open(url, '_blank');
}

function exportData(){
  const data={flats:S.flats,bills:S.bills,exportDate:new Date().toISOString(),version:'1.0'};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='SupremeLimra_Backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);
  showToast('Backup exported successfully ✓');
}
function importData(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.flats||!data.bills)throw new Error('Invalid backup file');
      if(!confirm('This will REPLACE all current data with backup. Are you sure?'))return;
      S.flats=data.flats;S.bills=data.bills;
      saveFlats();saveBills();
      showToast('Data restored successfully ✓');
      S.modal=null;render();
    }catch(err){showToast('Invalid backup file!','err');}
  };
  reader.readAsText(file);
}

function renderReports(){
  const ry=S.ry;
  const yrs=[...new Set([...S.bills.map(b=>b.year),now.getFullYear()])].sort((a,b)=>b-a);
  const yb=S.bills.filter(b=>b.year===ry);
  const yc=yb.filter(b=>b.status==='paid').reduce((s,b)=>s+b.amount,0);
  const yp=yb.filter(b=>b.status==='pending').reduce((s,b)=>s+b.amount,0);
  const mo=MO.map((m,i)=>{const mb=yb.filter(b=>b.month===i+1);return{name:m.slice(0,3),c:mb.filter(b=>b.status==='paid').reduce((s,b)=>s+b.amount,0),p:mb.filter(b=>b.status==='pending').reduce((s,b)=>s+b.amount,0)};});
  const mx=Math.max(...mo.map(m=>m.c+m.p),1);
  const mRows=mo.filter(m=>m.c||m.p).map(m=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:600;color:var(--tx);width:32px">${m.name}</span><div style="display:flex;gap:10px"><span style="color:var(--gr);font-weight:600">${fmt(m.c)}</span>${m.p?`<span style="color:var(--re)">+${fmt(m.p)} due</span>`:''}</div></div><div class="pb"><div class="pf" style="width:${(m.c/mx)*100}%"></div></div></div>`).join('');
  const def=S.flats.map(f=>{const pb=S.bills.filter(b=>b.flatId===f.id&&b.status==='pending');return{f,amt:pb.reduce((s,b)=>s+b.amount,0),cnt:pb.length};}).filter(x=>x.amt>0).sort((a,b)=>b.amt-a.amt);
  const defRows=def.map(({f,amt,cnt})=>`<div class="li"><div class="fb" style="background:var(--re);font-size:11px">${esc(f.flatNo)}</div><div class="ii"><div class="iname">${esc(f.ownerName)}</div><div class="isub">${cnt} month${cnt>1?'s':''} · 📱 ${f.mobile||'—'}</div></div><span style="font-family:var(--serif);font-weight:700;font-size:16px;color:var(--re)">${fmt(amt)}</span></div>`).join('');
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="stt" style="margin-bottom:0">Reports</span><select class="inp" style="width:auto;padding:6px 32px 6px 10px;font-size:14px" onchange="S.ry=+this.value;render()">${yrs.map(y=>`<option value="${y}" ${ry===y?'selected':''}>${y}</option>`).join('')}</select></div>
<div class="sg"><div class="sc"><div class="sl">Year Collected</div><div class="sv" style="color:var(--gr);font-size:20px">${fmt(yc)}</div></div><div class="sc"><div class="sl">Year Pending</div><div class="sv" style="color:var(--re);font-size:20px">${fmt(yp)}</div></div></div>
<div class="crd"><div class="stt">Monthly Summary — ${ry}</div>${mRows||`<p style="color:var(--mu);font-size:13px;text-align:center;padding:12px 0">No data for ${ry}</p>`}</div>
${def.length?`<div class="crd"><div class="stt">🔴 Outstanding Dues</div>${defRows}</div>`:''}`;
}

function renderModal(){
  const m=S.modal;
  let body='';
  if(m.type==='flatForm') body=renderFlatForm(m.data);
  else if(m.type==='genBills') body=renderGenBills();
  else if(m.type==='payment') body=renderPayment(m.data);
  else if(m.type==='receipt') body=renderReceipt(m.data);
  else if(m.type==='waFlow') body=renderWAFlow(m.data);
  else if(m.type==='changePin') body=renderChangePin();
  else if(m.type==='pdfGuide') body=renderPdfGuide(m.data);
  else if(m.type==='imgGuide') body=renderImgGuide(m.data);
  else if(m.type==='waReady') body=renderWaReady(m.data);
  else if(m.type==='yearEnd') body=renderYearEnd(m.data);
  return`<div class="mbox" id="modal-box"><div class="mdrag"></div>${body}</div>`;
}

function renderWAFlow(data){

document.addEventListener('click',function(e){
  // Close modal when clicking the dark overlay background (not the modal card itself)
  if(e.target.id==='modal-ov'){S.modal=null;render();return;}

  const el=e.target.closest('[data-action]');
  if(!el)return;
  const a=el.dataset.action,id=el.dataset.id||'';
  
  if(a==='login'){
    const pin=document.getElementById('pin-input')?.value||'';
    const loginBtn=document.querySelector('[data-action="login"]');
    if(loginBtn){loginBtn.textContent='Checking…';loginBtn.disabled=true;}
    DB.loginUser(pin).then(result=>{
      if(result.ok){
        loadData().then(()=>render());
      } else {
        const err=document.getElementById('pin-err');
        if(err){err.textContent=result.msg||'Wrong PIN';setTimeout(()=>{err.textContent='';},2500);}
        if(loginBtn){loginBtn.textContent='Unlock App 🔓';loginBtn.disabled=false;}
      }
    });
    return;
  }
  if(a==='logout'){if(confirm('Logout from the app?')){DB.logout();S.tab='dashboard';S.modal=null;render();} return;}
  if(a==='tab'){S.tab=el.dataset.tab;S.modal=null;render();return;}
  if(a==='close-modal'){S.modal=null;render();return;}
  
  // Flat actions
  if(a==='add-flat'){S.modal={type:'flatForm',data:null};render();return;}
  if(a==='edit-flat'){S.modal={type:'flatForm',data:S.flats.find(f=>f.id===id)};render();return;}
  if(a==='del-flat'){if(confirm('Delete this flat and all its bills?')){S.flats=S.flats.filter(f=>f.id!==id);S.bills=S.bills.filter(b=>b.flatId!==id);saveFlats();saveBills();showToast('Flat deleted');}return;}
  if(a==='save-flat'){
    const no=document.getElementById('ff-no')?.value.trim();
    const name=document.getElementById('ff-name')?.value.trim();
    const mob=document.getElementById('ff-mob')?.value.trim();
    const floor=document.getElementById('ff-floor')?.value.trim();
    const maint=+(document.getElementById('ff-maint')?.value||1000);
    if(!no){alert('Flat number required');return;}
    if(!name){alert('Owner name required');return;}
    const data={flatNo:no,ownerName:name,mobile:mob,floor,maintenance:maint};
    if(id){S.flats=S.flats.map(f=>f.id===id?{...data,id}:f);showToast('Flat updated ✓');}
    else{S.flats.push({...data,id:uid()});showToast('Flat added ✓');}
    saveFlats();S.modal=null;render();return;
  }
  
  // Bills
  if(a==='open-gen'){S.modal={type:'genBills'};render();return;}
  if(a==='do-gen'){
    const m=+(document.getElementById('gen-month')?.value||S.bf.month);
    const y=+(document.getElementById('gen-year')?.value||S.bf.year);
    const wa=document.getElementById('gen-wa')?.checked;
    const existing=S.bills.filter(b=>b.month===m&&b.year===y);
    const nf=S.flats.filter(f=>!existing.find(b=>b.flatId===f.id));
    if(!nf.length){showToast('Bills already generated for all flats','err');return;}
    const nb=nf.map(f=>({id:uid(),flatId:f.id,month:m,year:y,amount:f.maintenance,status:'pending',receiptNo:null,paidDate:null,paymentMode:null,generatedDate:new Date().toLocaleDateString('en-IN')}));
    S.bills=[...S.bills,...nb];saveBills();S.bf.month=m;S.bf.year=y;
    if(wa){const eligible=nb.filter(b=>S.flats.find(f=>f.id===b.flatId)?.mobile);if(eligible.length){S.modal={type:'waFlow',data:{bills:eligible,step:'send',idx:0,done:[]}};showToast(`${nb.length} bills generated ✓`);render();return;}}
    showToast(`${nb.length} bills generated ✓`);S.modal=null;render();return;
  }
  if(a==='open-pay'){const b=S.bills.find(x=>x.id===id);if(b){S.modal={type:'payment',data:b};render();}return;}
  if(a==='do-pay'){
    const b=S.bills.find(x=>x.id===id);if(!b)return;
    const amt=+(document.getElementById('pay-amt')?.value||0);
    const date=document.getElementById('pay-date')?.value;
    const mode=document.getElementById('pay-mode')?.value||'Cash';
    if(!amt){alert('Enter amount');return;}
    const lastRcpt=S.bills.reduce((mx,b)=>Math.max(mx,+(b.receiptNo||0)),0);
    const updated={...b,status:'paid',amount:amt,paidDate:new Date(date).toLocaleDateString('en-IN'),paymentMode:mode,receiptNo:String(lastRcpt+1).padStart(4,'0')};
    S.bills=S.bills.map(x=>x.id===id?updated:x);saveBills();
    showToast('Payment recorded ✓');
    S.modal={type:'receipt',data:updated};
    S._pdfUrl=null;S._pdfUploading=true;
    render();
    // Background upload starts immediately after payment
    if(FB_READY && _fbST){
      uploadReceiptAndGetLink(updated, flatOf(updated))
        .then(url=>{ S._pdfUrl=url; S._pdfUploading=false; })
        .catch(()=>{ S._pdfUploading=false; });
    } else { S._pdfUploading=false; }
    return;
  }
  if(a==='open-receipt'){
    const b=S.bills.find(x=>x.id===id);
    if(b){
      S.modal={type:'receipt',data:b};
      S._pdfUrl=null; // reset
      S._pdfUploading=true;
      render();
      // Start upload in background — by the time user taps WA, it's ready
      if(FB_READY && _fbST){
        uploadReceiptAndGetLink(b, flatOf(b))
          .then(url=>{ S._pdfUrl=url; S._pdfUploading=false; updateReceiptHint(); })
          .catch(()=>{ S._pdfUploading=false; updateReceiptHint(); });
      } else {
        S._pdfUploading=false;
      }
    }
    return;
  }
  if(a==='print-pdf'){const b=S.bills.find(x=>x.id===id)||S.modal?.data;if(b){printPDF(b,flatOf(b));showToast('Opening PDF…','pdf');}return;}
  
  // WhatsApp
  if(a==='wa-bill'){
    const b = S.bills.find(x=>x.id===id);
    if(b){
      const f = flatOf(b);
      // Direct to contact's chat — user just taps Send
      goToWA(f.mobile, waMsg(f, b));
      showToast('Opening WhatsApp…','wa');
    }
    return;
  }
  if(a==='wa-open-now'){const b=S.bills.find(x=>x.id===id)||S.modal?.data?.bill;if(b){const f=flatOf(b);S.modal=null;render();setTimeout(()=>{openWA(f.mobile,waRcpt(f,b));},300);}return;}
  if(a==='wa-rcpt'){
    const b = S.bills.find(x=>x.id===id) || S.modal?.data;
    if(!b){ return; }
    const f = flatOf(b);
    // Use PDF URL if already uploaded (background), else text only
    const msg = S._pdfUrl ? waRcptWithLink(f, b, S._pdfUrl) : waRcpt(f, b);
    const n = f.mobile.replace(/\D/g,'');
    const phone = n.startsWith('91') ? n : '91'+n;
    // SYNCHRONOUS window.open — within user gesture — always works on iOS
    window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(msg), '_blank');
    showToast(S._pdfUrl ? 'Opening WhatsApp with PDF link ✓' : 'Opening WhatsApp…','wa');
    return;
  }
  if(a==='wa-start'){if(S.modal?.data){S.modal.data.step='send';S.modal.data.idx=0;S.modal.data.done=[];}render();return;}
  if(a==='wa-next'){
    const d=S.modal?.data;if(!d)return;
    if(d.idx>=d.bills.length)return;
    const bill=d.bills[d.idx];const f=flatOf(bill);
    goToWA(f.mobile, waMsg(f, bill));
    d.done=[...d.done,bill.id];d.idx++;
    render();return;
  }
  
  // Settings
  if(a==='change-pin'){S.modal={type:'changePin'};render();return;}
  if(a==='do-change-pin'){
    const old=document.getElementById('pin-old')?.value;
    const nw=document.getElementById('pin-new')?.value;
    const cfm=document.getElementById('pin-cfm')?.value;
    const err=document.getElementById('pin-change-err');
    if(old!==LS.getPin()){if(err)err.textContent='Current PIN is wrong.';return;}
    if(!nw||nw.length<6){if(err)err.textContent='New password must be at least 6 characters.';return;}
    if(nw!==cfm){if(err)err.textContent='PINs do not match.';return;}
    DB.setPin(nw);
    if(FB_READY && _fbAuth && _fbAuth.currentUser){
      _fbAuth.currentUser.updatePassword(nw)
        .catch(e=>console.log('Firebase password update:',e));
    }
    showToast('PIN changed successfully ✓');S.modal=null;render();return;
  }
  // open-wa deprecated — using plain <a href> now
  if(a==='copy-pdf-link-now'){
    const b=S.bills.find(x=>x.id===id)||S.modal?.data;
    if(!b){return;}
    const f=flatOf(b);
    showToast('Uploading PDF…','wa');
    uploadReceiptAndGetLink(b,f).then(link=>{
      if(!link){showToast('Upload failed — check Firebase Storage rules','err');return;}
      // Copy to clipboard
      const txt='Download your receipt: '+link;
      navigator.clipboard.writeText(link)
        .then(()=>showToast('PDF link copied! Paste in WhatsApp ✓','wa'))
        .catch(()=>{
          // iOS fallback
          const ta=document.createElement('textarea');
          ta.value=link;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';
          document.body.appendChild(ta);ta.focus();ta.select();
          try{document.execCommand('copy');}catch(e){}
          document.body.removeChild(ta);
          showToast('PDF link copied! Paste in WhatsApp ✓','wa');
        });
    });
    return;
  }
  if(a==='copy-pdf-link'){
    const link=el.dataset.link;
    if(link){
      navigator.clipboard.writeText(link)
        .then(()=>showToast('PDF link copied! Paste in WhatsApp ✓','wa'))
        .catch(()=>{
          // Fallback for iOS
          const ta=document.createElement('textarea');
          ta.value=link; ta.style.position='fixed'; ta.style.opacity='0';
          document.body.appendChild(ta); ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          showToast('PDF link copied! Paste in WhatsApp ✓','wa');
        });
    }
    return;
  }
  if(a==='force-refresh'){
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(regs=>{
        Promise.all(regs.map(r=>r.unregister())).then(()=>{
          // Clear all caches
          caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k)))).then(()=>{
            showToast('Cache cleared! Reloading…','ok');
            setTimeout(()=>window.location.reload(true),800);
          });
        });
      });
    } else {
      window.location.reload(true);
    }
    return;
  }
  if(a==='year-end-stmt'){S.modal={type:'yearEnd',data:{}};render();return;}
  if(a==='do-year-end'){
    const yr=+(document.getElementById('ye-year')?.value||new Date().getFullYear());
    S.modal=null;render();
    showToast('Generating statements…','ok');
    ensureJsPDF().then(loaded=>{
      if(!loaded){showToast('PDF library not loaded','err');return;}
      let count=0;
      S.flats.forEach((flat,i)=>{
        setTimeout(()=>{
          try{
            const doc=generateYearEndStatement(flat,S.bills,yr);
            if(doc){
              doc.save('Statement_'+yr+'_Flat'+flat.flatNo.replace('/','_')+'.pdf');
              count++;
              if(count===S.flats.length) showToast('All '+count+' statements generated ✓');
            }
          }catch(e){console.log('Statement error:',e);}
        },i*600); // stagger downloads 600ms apart
      });
    });
    return;
  }
  if(a==='export-data'){exportData();return;}
  if(a==='import-trigger'){document.getElementById('import-file')?.click();return;}
});

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', async () => {
    try{
      const reg = await navigator.serviceWorker.register('./sw.js');
      // Check for updates every time page loads
      reg.update();
      // When new SW is waiting, force it to activate immediately
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
            // New version available — reload page automatically
            console.log('[SW] New version detected, reloading...');
            window.location.reload();
          }
        });
      });
    }catch(e){
      console.log('SW registration failed:', e);
    }
  });
  // Also reload if SW controller changes (new SW took over)
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    console.log('[SW] Controller changed, reloading...');
    // Small delay to avoid reload loop
    setTimeout(() => window.location.reload(), 300);
  });
}
</script>
</body>
</html>
