*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0f2040;height:100%}

  lset:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}},
  isAuth(){if(FB_READY&&_fbAuth)return!!_fbAuth.currentUser;return sessionStorage.getItem('slimra_auth')==='1';},
  async loginUser(pin){
    if(FB_READY){
      try{
        await _fbAuth.signInWithEmailAndPassword(SOCIETY_EMAIL,pin);
        sessionStorage.setItem('slimra_auth','1');
        return{ok:true};
      }catch(e){
        return{ok:false,msg:e.code==='auth/wrong-password'||e.code==='auth/invalid-login-credentials'?'Wrong password':'Login error: '+e.message};
      }
    }
    if(pin===(localStorage.getItem('slimra_pin')||'1234')){sessionStorage.setItem('slimra_auth','1');return{ok:true,local:true};}

  setPin:(v)=>localStorage.setItem('slimra_pin',v),
  async load(){
    if(FB_READY&&_fbFS&&this.isAuth()){
      try{
        const[fd,bd]=await Promise.all([_fbFS.collection('society').doc('flats').get(),_fbFS.collection('society').doc('bills').get()]);
        const flats=fd.exists?fd.data().list:null;
        const bills=bd.exists?bd.data().list:null;
        if(flats)this.lset('slimra_flats_v3',flats);
        if(bills)this.lset('slimra_bills_v2',bills);
        return{flats:flats||this.lget('slimra_flats_v3')||JSON.parse(JSON.stringify(INIT_FLATS)),bills:bills||this.lget('slimra_bills_v2')||[],source:'firebase'};
      }catch(e){console.log('Firebase load:',e);}
    }
    return{flats:this.lget('slimra_flats_v3')||JSON.parse(JSON.stringify(INIT_FLATS)),bills:this.lget('slimra_bills_v2')||[],source:'local'};
  },
  saveFlats(f){this.lset('slimra_flats_v3',f);if(FB_READY&&_fbFS&&this.isAuth())_fbFS.collection('society').doc('flats').set({list:f,updated:new Date().toISOString()}).catch(()=>{});},
  saveBills(b){this.lset('slimra_bills_v2',b);if(FB_READY&&_fbFS&&this.isAuth())_fbFS.collection('society').doc('bills').set({list:b,updated:new Date().toISOString()}).catch(()=>{});},
  subscribeChanges(onF,onB){
    if(!FB_READY||!_fbFS)return;
    _fbFS.collection('society').doc('flats').onSnapshot(s=>{if(s.exists){const d=s.data().list;this.lset('slimra_flats_v3',d);onF(d);}});
    _fbFS.collection('society').doc('bills').onSnapshot(s=>{if(s.exists){const d=s.data().list;this.lset('slimra_bills_v2',d);onB(d);}});
  }
};

function numToWords(n){
  if(!n)return'Zero Only';
  const o=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const t=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function c(x){if(x<20)return o[x];if(x<100)return t[Math.floor(x/10)]+(x%10?' '+o[x%10]:'');if(x<1000)return o[Math.floor(x/100)]+' Hundred'+(x%100?' '+c(x%100):'');if(x<100000)return c(Math.floor(x/1000))+' Thousand'+(x%1000?' '+c(x%1000):'');if(x<10000000)return c(Math.floor(x/100000))+' Lakh'+(x%100000?' '+c(x%100000):'');return c(Math.floor(x/10000000))+' Crore'+(x%10000000?' '+c(x%10000000):'');}
  return c(n)+' Only';
}

function buildReceiptPDF(bill, flat) {
  if(!window.jspdf){return null;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'p',unit:'mm',format:[148,210]});
  const W=148, mx=6, rw=136;
  let y=6;

  // Outer border
  doc.setLineWidth(0.8); doc.setDrawColor(15,32,64); doc.rect(mx,y,rw,196);

  // Navy Header
  doc.setFillColor(15,32,64); doc.rect(mx,y,rw,24,'F');
  doc.setFillColor(201,147,42); doc.rect(mx,y+24,rw,1.5,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.setTextColor(255,255,255);
  doc.text('SUPREME LIMRA',W/2,y+11,{align:'center'});
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(201,147,42);
  doc.text('Sr. No. 15, Inaam Nagar, Kondhwa Khurd, Pune - 411048',W/2,y+18,{align:'center'});
  doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(180,130,30);
  doc.text('MAINTENANCE RECEIPT',W/2,y+22,{align:'center'});
  y+=27;

  // Right column: draw ALL backgrounds first to prevent overlap
  const R=mx+rw, bx=R-29, bw=28;
  doc.setFillColor(242,237,227);
  doc.setDrawColor(200,190,175); doc.setLineWidth(0.3);
  doc.rect(bx,y,bw,16,'F'); doc.rect(bx,y,bw,16);  // No. box
  doc.rect(bx,y+18,bw,13,'F'); doc.rect(bx,y+18,bw,13);  // Date box

  // No. text
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(100,100,100);
  doc.text('No.',bx+bw/2,y+5,{align:'center'});
  doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(15,32,64);
  doc.text(String(bill.receiptNo||''),bx+bw/2,y+13,{align:'center'});
  // Date text
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(100,100,100);
  doc.text('Date',bx+bw/2,y+23,{align:'center'});
  doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(15,32,64);
  doc.text(bill.paidDate||'',bx+bw/2,y+29.5,{align:'center'});

  // Left column: Name (row 1)
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(80,80,80);
  doc.text('Received from Mr./Mrs./Ms.',mx+3,y+6);
  const lw1=doc.getTextWidth('Received from Mr./Mrs./Ms. ');
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(0,0,0);
  doc.text(flat.ownerName||'',mx+3+lw1,y+6);
  doc.setLineWidth(0.3); doc.setDrawColor(180,180,180);
  doc.line(mx+3+lw1,y+7,bx-2,y+7);

  // Left column: Flat No. (row 2)
  y+=10;
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(80,80,80);
  doc.text('Flat / Garage / Shop No. :',mx+3,y+5);
  const fw2=doc.getTextWidth('Flat / Garage / Shop No. : ');
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(0,0,0);
  doc.text(flat.flatNo||'',mx+3+fw2,y+5);
  doc.setLineWidth(0.3); doc.setDrawColor(180,180,180);
  doc.line(mx+3+fw2,y+6,bx-2,y+6);

  // "On account" small grey note
  y+=10;
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(150,150,150);
  doc.text('On account of the particulars stated below',mx+3,y+3);
  y+=7;

  // Gold divider
  doc.setFillColor(201,147,42); doc.rect(mx,y,rw,0.8,'F'); y+=1.5;

  // Table
  const srW=11, amtW=28, ptW=rw-srW-amtW, hdrH=8, rowH=7;
  doc.setFillColor(15,32,64); doc.rect(mx,y,rw,hdrH,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(255,255,255);
  doc.text('Sr',mx+srW/2,y+5.5,{align:'center'});
  doc.text('Particulars',mx+srW+ptW/2,y+5.5,{align:'center'});
  doc.text('Amount',mx+srW+ptW+amtW/2,y+5.5,{align:'center'});
  y+=hdrH; doc.setLineWidth(0.2);

  const itemM=MS[bill.month-1]+'-'+String(bill.year).slice(-2);
  const ROWS=[
    {sr:1,l:'Maintenance Charges',x:itemM,a:bill.amount},
    {sr:2,l:'Entrance Fees'},{sr:3,l:'Interest On Defaulted Dues'},
    {sr:4,l:'Contribution Towards Construction'},{sr:5,l:'Lease Rent'},
    {sr:6,l:'Municipal Taxes'},{sr:7,l:'Water Charges'},
    {sr:8,l:'Electricity Charges'},{sr:9,l:'Parking Charges'},
    {sr:10,l:'Lift Charges'},{sr:11,l:'Service Charges'},
    {sr:12,l:'Miscellaneous'},{sr:13,l:'Terrace Charge'},
    {sr:14,l:''},{sr:15,l:''},
  ];

  ROWS.forEach((row,i)=>{
    if(i%2===0){doc.setFillColor(252,250,246);doc.rect(mx,y,rw,rowH,'F');}
    doc.setDrawColor(220,215,205);
    doc.rect(mx,y,srW,rowH); doc.rect(mx+srW,y,ptW,rowH); doc.rect(mx+srW+ptW,y,amtW,rowH);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(150,150,150);
    doc.text(String(row.sr),mx+srW/2,y+5,{align:'center'});
    if(row.l){doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(30,30,30);doc.text(row.l,mx+srW+2,y+5);}
    if(row.x){const lx=row.l?doc.getTextWidth(row.l)+2:2;doc.setFont('helvetica','bold');doc.setTextColor(15,32,64);doc.setFontSize(8.5);doc.text(row.x,mx+srW+lx+2,y+5);doc.setTextColor(30,30,30);}
    if(row.a){doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(26,127,55);doc.text(row.a+'/-',mx+srW+ptW+amtW-2,y+5,{align:'right'});doc.setTextColor(30,30,30);}
    y+=rowH;
  });

  // Total
  doc.setFillColor(15,32,64); doc.rect(mx,y,rw,9,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(255,255,255);
  doc.text('Total',mx+srW+ptW-2,y+6.5,{align:'right'});
  doc.setTextColor(201,147,42); doc.setFontSize(11);
  doc.text(bill.amount+'/-',mx+srW+ptW+amtW-2,y+6.5,{align:'right'}); y+=11;

  // Rs in words
  doc.setFillColor(252,250,246); doc.rect(mx,y,rw,9,'F');
  doc.setDrawColor(220,215,205); doc.rect(mx,y,rw,9);
  doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(80,80,80);
  doc.text('Rs. in words: ',mx+3,y+6);
  const wlw=doc.getTextWidth('Rs. in words: ');
  doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0);
  doc.text(numToWords(bill.amount),mx+3+wlw,y+6);
  if(bill.paymentMode){
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(120,120,120);
    doc.text('Mode: '+bill.paymentMode,R-3,y+6,{align:'right'});
  }
  y+=11;

  // Footer
  doc.setFillColor(201,147,42); doc.rect(mx,y,rw,0.6,'F'); y+=4;
  doc.setFont('helvetica','italic'); doc.setFontSize(7.5); doc.setTextColor(120,100,60);
  doc.text('This is a computer generated receipt. No signature required.',W/2,y,{align:'center'});
  y+=4; doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(150,150,150);
  doc.text('Supreme Limra Society Management — '+new Date().getFullYear(),W/2,y,{align:'center'});

  // PAID diagonal stamp
  doc.saveGraphicsState();
  doc.setGState(new doc.GState({opacity:0.10}));
  doc.setFont('helvetica','bold'); doc.setFontSize(52); doc.setTextColor(26,127,55);
  doc.text('PAID',W/2,110,{align:'center',angle:45});
  doc.restoreGraphicsState();

  return doc;
}

async function uploadReceiptAndGetLink(bill,flat){
  if(!FB_READY||!_fbST)return null;
  try{
    const loaded=await ensureJsPDF();if(!loaded)return null;
    const doc=buildReceiptPDF(bill,flat);if(!doc)return null;
    const blob=doc.output('blob');
    const fname='receipts/Receipt_'+bill.receiptNo+'_Flat'+flat.flatNo.replace(/\//g,'_')+'_'+Date.now()+'.pdf';
    const ref=_fbST.ref(fname);
    const up=ref.put(blob,{contentType:'application/pdf'});
    const tout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),8000));
    await Promise.race([up,tout]);
    return await ref.getDownloadURL();
  }catch(e){console.log('Upload:',e.message);return null;}
}
function printPDF(bill,flat){
  ensureJsPDF().then(ok=>{
    if(!ok){showToast('PDF library not loaded','err');return;}
    const doc=buildReceiptPDF(bill,flat);if(!doc)return;
    if(/iPhone|iPad|Android/i.test(navigator.userAgent)){
      doc.save('Receipt_'+bill.receiptNo+'_Flat'+flat.flatNo.replace('/','_')+'.pdf');
      showToast('PDF saved to Downloads ✓');
    }else{
      const blob=doc.output('blob');
      const url=URL.createObjectURL(blob);
      window.open(url,'_blank');
      setTimeout(()=>URL.revokeObjectURL(url),60000);
    }
  });
}

document.addEventListener('click',function(e){
  // Close modal when clicking the dark overlay background (not the modal card itself)
  if(e.target.id==='modal-ov'){S.modal=null;render();return;}

  const el=e.target.closest('[data-action]');
  if(!el)return;
  const a=el.dataset.action,id=el.dataset.id||'';
  
  if(a==='login'){
    const pin=document.getElementById('pin-input')?.value||'';
    const loginBtn=document.querySelector('[data-action="login"]');
    if(loginBtn){loginBtn.textContent='Checking…';loginBtn.disabled=true;}
    DB.loginUser(pin).then(result=>{
      if(result.ok){loadData().then(()=>render());}
      else{
        const err=document.getElementById('pin-err');
        if(err){err.textContent=result.msg||'Wrong password';setTimeout(()=>{err.textContent='';},2500);}
        if(loginBtn){loginBtn.textContent='Unlock App 🔓';loginBtn.disabled=false;}
      }
    });
    return;
  }
  if(a==='logout'){if(confirm('Logout from the app?')){LS.logout();render();} return;}
  if(a==='tab'){S.tab=el.dataset.tab;S.modal=null;render();return;}
  if(a==='close-modal'){S.modal=null;render();return;}
  
  // Flat actions
  if(a==='add-flat'){S.modal={type:'flatForm',data:null};render();return;}
  if(a==='edit-flat'){S.modal={type:'flatForm',data:S.flats.find(f=>f.id===id)};render();return;}
  if(a==='del-flat'){if(confirm('Delete this flat and all its bills?')){S.flats=S.flats.filter(f=>f.id!==id);S.bills=S.bills.filter(b=>b.flatId!==id);saveFlats();saveBills();showToast('Flat deleted');}return;}
  if(a==='save-flat'){
    const no=document.getElementById('ff-no')?.value.trim();
    const name=document.getElementById('ff-name')?.value.trim();
    const mob=document.getElementById('ff-mob')?.value.trim();
    const floor=document.getElementById('ff-floor')?.value.trim();
    const maint=+(document.getElementById('ff-maint')?.value||1000);
    if(!no){alert('Flat number required');return;}
    if(!name){alert('Owner name required');return;}
    const data={flatNo:no,ownerName:name,mobile:mob,floor,maintenance:maint};
    if(id){S.flats=S.flats.map(f=>f.id===id?{...data,id}:f);showToast('Flat updated ✓');}
    else{S.flats.push({...data,id:uid()});showToast('Flat added ✓');}
    saveFlats();S.modal=null;render();return;
  }
  
  // Bills
  if(a==='open-gen'){S.modal={type:'genBills'};render();return;}
  if(a==='do-gen'){
    const m=+(document.getElementById('gen-month')?.value||S.bf.month);
    const y=+(document.getElementById('gen-year')?.value||S.bf.year);
    const wa=document.getElementById('gen-wa')?.checked;
    const existing=S.bills.filter(b=>b.month===m&&b.year===y);
    const nf=S.flats.filter(f=>!existing.find(b=>b.flatId===f.id));
    if(!nf.length){showToast('Bills already generated for all flats','err');return;}
    const nb=nf.map(f=>({id:uid(),flatId:f.id,month:m,year:y,amount:f.maintenance,status:'pending',receiptNo:null,paidDate:null,paymentMode:null,generatedDate:new Date().toLocaleDateString('en-IN')}));
    S.bills=[...S.bills,...nb];saveBills();S.bf.month=m;S.bf.year=y;
    if(wa){const eligible=nb.filter(b=>S.flats.find(f=>f.id===b.flatId)?.mobile);if(eligible.length){S.modal={type:'waFlow',data:{bills:eligible,step:'send',idx:0,done:[]}};showToast(`${nb.length} bills generated ✓`);render();return;}}
    showToast(`${nb.length} bills generated ✓`);S.modal=null;render();return;
  }
  if(a==='open-pay'){const b=S.bills.find(x=>x.id===id);if(b){S.modal={type:'payment',data:b};render();}return;}
  if(a==='do-pay'){
    const b=S.bills.find(x=>x.id===id);if(!b)return;
    const amt=+(document.getElementById('pay-amt')?.value||0);
    const date=document.getElementById('pay-date')?.value;
    const mode=document.getElementById('pay-mode')?.value||'Cash';
    if(!amt){alert('Enter amount');return;}
    const lastRcpt=S.bills.reduce((mx,b)=>Math.max(mx,+(b.receiptNo||0)),0);
    const updated={...b,status:'paid',amount:amt,paidDate:new Date(date).toLocaleDateString('en-IN'),paymentMode:mode,receiptNo:String(lastRcpt+1).padStart(4,'0')};
    S.bills=S.bills.map(x=>x.id===id?updated:x);saveBills();
    showToast('Payment recorded ✓');S.modal={type:'receipt',data:updated};render();return;
  }
  if(a==='open-receipt'){
    const b=S.bills.find(x=>x.id===id);
    if(b){
      S.modal={type:'receipt',data:b};S._pdfUrl=null;S._pdfUploading=true;render();
      if(FB_READY&&_fbST){
        uploadReceiptAndGetLink(b,flatOf(b))
          .then(url=>{S._pdfUrl=url;S._pdfUploading=false;updateReceiptHint();})
          .catch(()=>{S._pdfUploading=false;updateReceiptHint();});
      } else {S._pdfUploading=false;}
    }
    return;
  }
  if(a==='print-pdf'){const b=S.bills.find(x=>x.id===id)||S.modal?.data;if(b){printPDF(b,flatOf(b));showToast('Opening PDF…','pdf');}return;}
  
  // WhatsApp
  if(a==='wa-bill'){const b=S.bills.find(x=>x.id===id);if(b){const f=flatOf(b);showToast('Opening WhatsApp…','wa');sendBillOnWA(b,f);}return;}
  if(a==='wa-open-now'){const b=S.bills.find(x=>x.id===id)||S.modal?.data?.bill;if(b){const f=flatOf(b);S.modal=null;render();setTimeout(()=>{openWA(f.mobile,waRcpt(f,b));},300);}return;}
  if(a==='wa-rcpt'){const b=S.bills.find(x=>x.id===id)||S.modal?.data;if(b){const f=flatOf(b);shareReceiptOnWA(b,f);}return;}
  if(a==='bulk-wa'){
    const pend=S.bills.filter(b=>b.month===S.bf.month&&b.year===S.bf.year&&b.status==='pending'&&flatOf(b).mobile);
    if(!pend.length){showToast('No pending bills with mobile numbers','err');return;}
    S.modal={type:'waFlow',data:{bills:pend,step:'send',idx:0,done:[]}};render();return;
  }
  if(a==='wa-start'){if(S.modal?.data){S.modal.data.step='send';S.modal.data.idx=0;S.modal.data.done=[];}render();return;}
  if(a==='wa-next'){
    const d=S.modal?.data;if(!d)return;
    if(d.idx>=d.bills.length)return;
    const bill=d.bills[d.idx];const f=flatOf(bill);
    sendBillOnWA(bill,f);
    d.done=[...d.done,bill.id];d.idx++;
    render();return;
  }
  
  // Settings
  if(a==='change-pin'){S.modal={type:'changePin'};render();return;}
  if(a==='do-change-pin'){
    const old=document.getElementById('pin-old')?.value;
    const nw=document.getElementById('pin-new')?.value;
    const cfm=document.getElementById('pin-cfm')?.value;
    const err=document.getElementById('pin-change-err');
    if(old!==LS.getPin()){if(err)err.textContent='Current PIN is wrong.';return;}
    if(!nw||nw.length<4){if(err)err.textContent='New PIN must be at least 4 digits.';return;}
    if(nw!==cfm){if(err)err.textContent='PINs do not match.';return;}
    LS.setPin(nw);showToast('PIN changed successfully ✓');S.modal=null;render();return;
  }
  if(a==='export-data'){exportData();return;}
  if(a==='import-trigger'){document.getElementById('import-file')?.click();return;}
});

// Handle Enter key in PIN input
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    const pi=document.getElementById('pin-input');
    if(pi===document.activeElement){document.querySelector('[data-action="login"]')?.click();}
  }
});

window.addEventListener('DOMContentLoaded', async function(){
  render(); // show login immediately
  initFirebase();
  setTimeout(async function(){
    if(FB_READY&&_fbAuth){
      await new Promise(resolve=>{const u=_fbAuth.onAuthStateChanged(user=>{u();resolve(user);});});
    }
    if(DB.isAuth()){await loadData();render();}
  },300);
  // Register as PWA if supported
  if('serviceWorker' in navigator){
    // Optional: could add SW for offline
  }
});
</script>

      const reg=await navigator.serviceWorker.register('./sw.js');
      reg.update();
    }catch(e){console.log('SW:',e);}
