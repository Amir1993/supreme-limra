function numToWords(n){
  if(!n)return'Zero Only';
  const o=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const t=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function c(x){if(x<20)return o[x];if(x<100)return t[Math.floor(x/10)]+(x%10?' '+o[x%10]:'');if(x<1000)return o[Math.floor(x/100)]+' Hundred'+(x%100?' '+c(x%100):'');if(x<100000)return c(Math.floor(x/1000))+' Thousand'+(x%1000?' '+c(x%1000):'');if(x<10000000)return c(Math.floor(x/100000))+' Lakh'+(x%100000?' '+c(x%100000):'');return c(Math.floor(x/10000000))+' Crore'+(x%10000000?' '+c(x%10000000):'');}
  return c(n)+' Only';
}

// SMART WHATSAPP SHARE — PDF + Text via native share sheet
// Falls back to wa.me link if Web Share API unavailable
// ════════════════════════════════════════════════════
// Dynamically load jsPDF if not yet available
function ensureJsPDF(){
  return new Promise(resolve=>{
    if(window.jspdf){resolve(true);return;}
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=()=>resolve(true);
    s.onerror=()=>resolve(false);
    document.head.appendChild(s);
  });
}

async function shareReceiptOnWA(bill, flat) {
  const text = waRcpt(flat, bill);
  showToast('Preparing receipt image…','wa');

  // ── Capture receipt preview as PNG image ──────────────────────────────
  // The .rct-p element is currently visible in the receipt modal
  const receiptEl = document.querySelector('.rct-p');

  if(receiptEl && typeof html2canvas === 'function'){
    try{
      // Capture the receipt HTML element as a high-quality PNG
      const canvas = await html2canvas(receiptEl,{
        scale:2,                     // 2x for crisp quality
        useCORS:true,
        backgroundColor:'#ffffff',
        logging:false,
        removeContainer:true
      });

      // Convert canvas to PNG blob
      const blob = await new Promise(r=>canvas.toBlob(r,'image/png',0.97));
      const imgDataUrl = canvas.toDataURL('image/png',0.97);
      const imgFile = new File([blob],'Receipt_'+bill.receiptNo+'_Flat_'+flat.flatNo+'.png',{type:'image/png'});

      // ── Try 1: Web Share API with image file (1-tap on HTTPS / some local setups)
      if(navigator.canShare && navigator.canShare({files:[imgFile]})){
        try{
          await navigator.share({files:[imgFile],title:'Receipt #'+bill.receiptNo,text});
          return; // SUCCESS — share sheet opened with image
        }catch(e){
          if(e.name==='AbortError')return; // user cancelled share sheet
        }
      }

      // ── Try 2: Also try PDF alongside (belt & suspenders on HTTPS)
      const pdfLoaded = await ensureJsPDF();
      if(pdfLoaded){
        const doc = buildReceiptPDF(bill,flat);
        if(doc){
          const pdfBlob = doc.output('blob');
          const pdfFile = new File([pdfBlob],'Receipt_'+bill.receiptNo+'.pdf',{type:'application/pdf'});
          if(navigator.canShare && navigator.canShare({files:[pdfFile]})){
            try{
              await navigator.share({files:[pdfFile],title:'Receipt #'+bill.receiptNo,text});
              return;
            }catch(e){if(e.name==='AbortError')return;}
          }
        }
      }

      // ── Fallback: Show image in modal — user long-presses to save then shares
      if(S._lastImgUrl) try{URL.revokeObjectURL(S._lastImgUrl);}catch(err){}
      S._lastImgUrl = URL.createObjectURL(blob);
      S.modal = {type:'imgGuide', data:{bill,flat,imgDataUrl,text}};
      render();
      return;

    }catch(err){
      console.log('html2canvas error:',err);
    }
  }

  // ── Ultimate fallback: text-only WhatsApp ─────────────────────────────
  if(flat.mobile) openWA(flat.mobile, text);
}

function exportData(){
  const data={flats:S.flats,bills:S.bills,expenses:S.expenses||[],exportDate:new Date().toISOString(),version:'1.0'};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='SupremeLimra_Backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);
  showToast('Backup exported successfully ✓');
}
function importData(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.flats||!data.bills)throw new Error('Invalid backup file');
      if(!confirm('This will REPLACE all current data with backup. Are you sure?'))return;
      S.flats=data.flats;S.bills=data.bills;
      saveFlats();saveBills();
      showToast('Data restored successfully ✓');
      S.modal=null;render();
    }catch(err){showToast('Invalid backup file!','err');}
  };
  reader.readAsText(file);
}

    {id:'bills',l:'Bills',ic:'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>'},
    {id:'expenses',l:'Expenses',ic:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>'},
    {id:'reports',l:'Reports',ic:'<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>'},
    {id:'flats',l:'Flats',ic:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/>'},

  let content='';
  if(S.tab==='dashboard')content=renderDashboard();

  const modal=S.modal?`<div class="mov" id="modal-ov">${renderModal()}</div>`:'';

</div>${modal}${toast}`;
}

// RENDER — DASHBOARD
// ════════════════════════════════════════════════════
function renderDashboard(){
  // 25th reminder banner
  const today25 = now.getDate()===25;
  const mnthName = MO[now.getMonth()];
  const collected=S.bills.filter(b=>b.status==='paid').reduce((s,b)=>s+b.amount,0);
  const thisYearExp=(S.expenses||[]).filter(e=>new Date(e.date).getFullYear()===now.getFullYear()).reduce((s,e)=>s+e.amount,0);
  const netBal=collected-thisYearExp;
  const pending=S.bills.filter(b=>b.status==='pending').reduce((s,b)=>s+b.amount,0);
  const pendC=S.bills.filter(b=>b.status==='pending').length;
  const recent=[...S.bills].filter(b=>b.status==='paid').sort((a,b)=>new Date(b.paidDate)-new Date(a.paidDate)).slice(0,5);
  const pendTop=S.bills.filter(b=>b.status==='pending').slice(0,5);
  const pRows=pendTop.map(b=>{const f=flatOf(b);return`<div class="li"><div class="fb" style="font-size:11px">${esc(f.flatNo||'?')}</div><div class="ii"><div class="iname">${esc(f.ownerName||'—')}</div><div class="isub">${MO[b.month-1]} ${b.year}</div></div><div style="display:flex;align-items:center;gap:6px"><span style="font-family:var(--serif);font-weight:700;font-size:16px;color:var(--re)">${fmt(b.amount)}</span><button class="btn bn bsm" data-action="open-pay" data-id="${b.id}">Pay</button></div></div>`;}).join('');
  const rRows=recent.map(b=>{const f=flatOf(b);return`<div class="li" style="cursor:pointer" data-action="open-receipt" data-id="${b.id}"><div class="fb" style="background:var(--gr);font-size:11px">${esc(f.flatNo||'?')}</div><div class="ii"><div class="iname">${esc(f.ownerName||'—')}</div><div class="isub">${MO[b.month-1]} ${b.year} · ${b.paidDate}</div></div><div style="text-align:right"><div style="font-family:var(--serif);font-weight:700;font-size:16px;color:var(--gr)">${fmt(b.amount)}</div><div style="font-size:10px;color:var(--mu)">Tap receipt</div></div></div>`;}).join('');
  return`${today25?`<div style="background:linear-gradient(135deg,#1a7f37,#145a28);border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px">
  <div><div style="color:#fff;font-weight:700;font-size:13px">📊 Monthly Report Ready</div><div style="color:rgba(255,255,255,.75);font-size:11px;margin-top:2px">Today is 25th — generate ${mnthName} Excel report</div></div>
  <button class="btn" style="background:#fff;color:#1a7f37;font-weight:700;font-size:12px;padding:8px 12px;border-radius:10px;flex-shrink:0" data-action="gen-monthly-excel">Generate 📊</button>
</div>`:''}
<div class="sg" style="margin-top:4px">
  <div class="sc" style="background:linear-gradient(135deg,#0f2040,#1a3260)"><div class="sl" style="color:rgba(255,255,255,.6)">Total Flats</div><div class="sv" style="color:#fff">${S.flats.length}</div></div>
  <div class="sc" style="background:linear-gradient(135deg,#c9932a,#b8821e)"><div class="sl" style="color:rgba(255,255,255,.7)">Collected</div><div class="sv" style="color:#fff;font-size:20px">${fmt(collected)}</div></div>
  <div class="sc"><div class="sl">Pending Dues</div><div class="sv" style="color:var(--re);font-size:20px">${fmt(pending)}</div></div>
  <div class="sc"><div class="sl">Pending Bills</div><div class="sv">${pendC}</div></div>
  <div class="sc" style="grid-column:1/-1"><div class="sl">Net Balance (Collected - Spent)</div><div class="sv" style="font-size:20px;color:${netBal>=0?'var(--gr)':'var(--re)'}">${fmt(netBal)}</div><div style="font-size:10px;color:var(--mu);margin-top:4px">${fmt(collected)} collected · ${fmt(thisYearExp)} spent this year</div></div>
</div>
${pendTop.length?`<div class="crd"><div class="stt">⏳ Pending Dues</div>${pRows}</div>`:''}
${recent.length?`<div class="crd"><div class="stt">✅ Recent Payments</div>${rRows}</div>`:''}
${!S.bills.length?`<div class="crd"><div class="emp"><div class="emp-icon">🏢</div><p>Go to <strong>Bills</strong> tab → tap <strong>+ Generate</strong> to create monthly bills.</p></div></div>`:''}`;
}

function flatsList(){

}

function renderBills(){
  const bf=S.bf;
  const allBills=S.bills.filter(b=>b.month===bf.month&&b.year===bf.year&&(bf.status==='all'||b.status===bf.status));
  const mp=S.bills.filter(b=>b.month===bf.month&&b.year===bf.year&&b.status==='paid').reduce((s,b)=>s+b.amount,0);
  const md=S.bills.filter(b=>b.month===bf.month&&b.year===bf.year&&b.status==='pending').reduce((s,b)=>s+b.amount,0);
  const pendBills=S.bills.filter(b=>b.month===bf.month&&b.year===bf.year&&b.status==='pending');
  const yrs=[...new Set([...S.bills.map(b=>b.year),now.getFullYear()])].sort((a,b)=>b-a);
  const yrOpts=yrs.map(y=>`<option value="${y}" ${bf.year===y?'selected':''}>${y}</option>`).join('');

  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="stt" style="margin-bottom:0">Maintenance Bills</span><button class="btn bg bsm" data-action="open-gen">+ Generate</button></div>

    <select class="inp" style="flex:2;padding:8px 32px 8px 10px;font-size:14px" id="bf-month" onchange="S.bf.month=+this.value;render()">${MO.map((m,i)=>`<option value="${i+1}" ${bf.month===i+1?'selected':''}>${m}</option>`).join('')}</select>
    <select class="inp" style="flex:1;padding:8px 32px 8px 10px;font-size:14px" id="bf-year" onchange="S.bf.year=+this.value;render()">${yrOpts}</select>
    <select class="inp" style="flex:1.2;padding:8px 32px 8px 10px;font-size:14px" id="bf-status" onchange="S.bf.status=this.value;render()"><option value="all" ${bf.status==='all'?'selected':''}>All</option><option value="pending" ${bf.status==='pending'?'selected':''}>Pending</option><option value="paid" ${bf.status==='paid'?'selected':''}>Paid</option></select>

}

function renderReports(){
  const ry=S.ry;
  const allYrs=[...new Set([...S.bills.map(b=>b.year),...(S.expenses||[]).map(e=>new Date(e.date).getFullYear()),now.getFullYear()])].sort((a,b)=>b-a);
  const yb=S.bills.filter(b=>b.year===ry);
  const yc=yb.filter(b=>b.status==='paid').reduce((s,b)=>s+b.amount,0);
  const yp=yb.filter(b=>b.status==='pending').reduce((s,b)=>s+b.amount,0);
  const yearExp=(S.expenses||[]).filter(e=>new Date(e.date).getFullYear()===ry);
  const ye=yearExp.reduce((s,e)=>s+e.amount,0);
  const ybal=yc-ye;

  const mo=MO.map((m,i)=>{const mb=yb.filter(b=>b.month===i+1);return{name:m.slice(0,3),c:mb.filter(b=>b.status==='paid').reduce((s,b)=>s+b.amount,0),p:mb.filter(b=>b.status==='pending').reduce((s,b)=>s+b.amount,0)};});
  const mxv=Math.max(...mo.map(m=>m.c+m.p),1);
  const mRows=mo.filter(m=>m.c||m.p).map(m=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:600;color:var(--tx);width:32px">${m.name}</span><div style="display:flex;gap:10px"><span style="color:var(--gr);font-weight:600">${fmt(m.c)}</span>${m.p?`<span style="color:var(--re)">+${fmt(m.p)} due</span>`:''}</div></div><div class="pb"><div class="pf" style="width:${(m.c/mxv)*100}%"></div></div></div>`).join('');

  const def=S.flats.map(f=>{const pb=S.bills.filter(b=>b.flatId===f.id&&b.status==='pending');return{f,amt:pb.reduce((s,b)=>s+b.amount,0),cnt:pb.length};}).filter(x=>x.amt>0).sort((a,b)=>b.amt-a.amt);

  const expCatEmoji={Repair:'🔧',Cleaning:'🧹',Electricity:'💡',Water:'💧',Security:'🔒',Miscellaneous:'📦'};
  const expCatBg={Repair:'#fee2e2',Cleaning:'#e0f2fe',Electricity:'#fef9c3',Water:'#dbeafe',Security:'#f0fdf4',Miscellaneous:'#f3f4f6'};
  const sortedExp=[...yearExp].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const expRows=sortedExp.map(e=>`<div class="li">
    <div style="width:40px;height:40px;border-radius:10px;background:${expCatBg[e.category]||'#f3f4f6'};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${expCatEmoji[e.category]||'📦'}</div>
    <div class="ii"><div class="iname">${esc(e.description)}</div><div class="isub">${e.category}${e.notes?' · '+esc(e.notes):''} · ${new Date(e.date).toLocaleDateString('en-IN')}</div></div>
    <div style="text-align:right"><div style="font-family:var(--serif);font-weight:700;font-size:15px;color:var(--re)">${fmt(e.amount)}</div>
    <button class="btn brd bsm" style="margin-top:3px;padding:3px 7px;font-size:10px" data-action="del-expense" data-id="${e.id}">✕</button></div>
  </div>`).join('');

  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
  <span class="stt" style="margin-bottom:0">Reports</span>
  <div style="display:flex;gap:8px">
    <select class="inp" style="width:auto;padding:6px 32px 6px 10px;font-size:14px" onchange="S.ry=+this.value;render()">${allYrs.map(y=>`<option value="${y}" ${ry===y?'selected':''}>${y}</option>`).join('')}</select>
    <button class="btn bg bsm" data-action="add-expense">+ Expense</button>
  </div>
</div>

<!-- ── Balance Summary ── -->
<div class="crd" style="background:linear-gradient(135deg,#0f2040,#1a3260);padding:16px">
  <div style="font-size:10px;color:rgba(255,255,255,.5);margin-bottom:12px;letter-spacing:.5px;text-transform:uppercase">Balance Summary — ${ry}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
    <div style="text-align:center">
      <div style="font-size:10px;color:rgba(255,255,255,.5);margin-bottom:4px">Collected</div>
      <div style="font-family:var(--serif);font-size:17px;font-weight:700;color:#5dff9a">${fmt(yc)}</div>
    </div>
    <div style="text-align:center;border-left:1px solid rgba(255,255,255,.1);border-right:1px solid rgba(255,255,255,.1)">
      <div style="font-size:10px;color:rgba(255,255,255,.5);margin-bottom:4px">Spent</div>
      <div style="font-family:var(--serif);font-size:17px;font-weight:700;color:#ffb347">${fmt(ye)}</div>

      <div style="font-size:10px;color:rgba(255,255,255,.5);margin-bottom:4px">Net Balance</div>

      <div style="font-size:9px;color:rgba(255,255,255,.4)">${ybal>=0?'surplus':'deficit'}</div>

  ${yp>0?`<div style="background:rgba(255,100,100,.15);border:1px solid rgba(255,100,100,.25);border-radius:8px;padding:7px 10px;font-size:11px;color:#ffb3b3">⚠ ${fmt(yp)} pending from flat owners</div>`:

${def.length?`<div class="crd"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="stt" style="margin-bottom:0">🔴 Outstanding Dues</div><span style="font-family:var(--serif);font-weight:700;font-size:15px;color:var(--re)">${fmt(def.reduce((s,x)=>s+x.amt,0))}</span></div>${defRows}</div>`:''}

<div class="crd"><div class="stt">Monthly Collections — ${ry}</div>${mRows||`<p style="color:var(--mu);font-size:13px;text-align:center;padding:12px 0">No data for ${ry}</p>`}</div>

<div class="crd">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="stt" style="margin-bottom:0">💸 Expenses — ${ry}</div>

  ${expRows||`<div class="emp" style="padding:16px 0"><div class="emp-icon" style="font-size:28px">💸</div><p>No expenses for ${ry}.<br>Tap <strong>+ Expense</strong> to add.</p></div>`}
</div>`;
}

// ════════════════════════════════════════════════════
// RENDER — SETTINGS
// ════════════════════════════════════════════════════
function renderExpenses(){
  const em = S.expFilter||{month:now.getMonth()+1, year:now.getFullYear()};
  const allYrs=[...new Set([...(S.expenses||[]).map(e=>new Date(e.date).getFullYear()),now.getFullYear()])].sort((a,b)=>b-a);
  const yrs = allYrs.length ? allYrs : [now.getFullYear()];

  // Filter expenses
  const filtered = (S.expenses||[]).filter(e=>{
    const d=new Date(e.date);
    return d.getMonth()+1===em.month && d.getFullYear()===em.year;
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const totalExp = filtered.reduce((s,e)=>s+e.amount,0);

  // Group by category
  const byCat = {};
  filtered.forEach(e=>{
    if(!byCat[e.category]) byCat[e.category]=[];

function renderModal(){
  const m=S.modal;
  let body='';
  if(m.type==='flatForm') body=renderFlatForm(m.data);
  else if(m.type==='genBills') body=renderGenBills();
  else if(m.type==='payment') body=renderPayment(m.data);
  else if(m.type==='receipt') body=renderReceipt(m.data);
  else if(m.type==='waFlow') body=renderWAFlow(m.data);
  else if(m.type==='changePin') body=renderChangePin();
  else if(m.type==='pdfGuide') body=renderPdfGuide(m.data);
  else if(m.type==='imgGuide') body=renderImgGuide(m.data);
  return`<div class="mbox" id="modal-box"><div class="mdrag"></div>${body}</div>`;
}

function renderWAFlow(data){
  const {bills,step,idx,done}=data;
  if(step==='send'){
    const total=bills.length,sentCount=done.length;
    const rows=bills.map((b,i)=>{const f=flatOf(b);const sent=done.includes(b.id);const cur=i===idx;return`<div style="display:flex;align-items:center;padding:10px 14px;border-bottom:${i<bills.length-1?'1px solid #f0ebe0':'none'};opacity:${sent?'.5':'1'};background:${cur?'#f0fff4':'#fff'}"><div class="fb" style="background:${sent?'var(--gr)':cur?'var(--wa)':'var(--n)'};font-size:11px">${esc(f.flatNo)}</div><div class="ii"><div class="iname">${esc(f.ownerName)}</div><div class="isub">${fmt(b.amount)} · ${f.mobile}</div></div><span style="font-size:18px">${sent?'✅':cur?'👆':''}</span></div>`;}).join('');
    return`<div class="mttl">📲 Sending Bills on WhatsApp</div>
<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;color:var(--mu)"><span>Progress</span><span style="font-weight:600;color:var(--n)">${sentCount} / ${total} sent</span></div><div class="pb" style="height:10px"><div class="pf" style="width:${(sentCount/Math.max(total,1))*100}%;background:var(--wa)"></div></div></div>
<div style="max-height:260px;overflow-y:auto;background:#fff;border-radius:14px;border:1.5px solid #e8e2d4;margin-bottom:14px">${rows}</div>
<div style="display:flex;gap:10px">
<button class="btn bo" style="flex:1" data-action="close-modal">${idx>=total?'Done':'Skip'}</button>

</div>`;
  }
  return`<div class="mttl">Ready to send?</div><button class="btn bwa" style="width:100%" data-action="wa-start">Start Sending</button>`;
}

function ensureJsPDF(){return new Promise(r=>{if(window.jspdf){r(true);return;}const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';s.onload=()=>r(true);s.onerror=()=>r(false);document.head.appendChild(s);});}
async function uploadReceiptAndGetLink(bill,flat){if(!FB_READY||!_fbST)return null;try{const ok=await ensureJsPDF();if(!ok)return null;const doc=buildReceiptPDF(bill,flat);if(!doc)return null;const blob=doc.output('blob');const fname='receipts/Receipt_'+bill.receiptNo+'_Flat'+flat.flatNo.replace(/[/]/g,'_')+'_'+Date.now()+'.pdf';const ref=_fbST.ref(fname);await Promise.race([ref.put(blob,{contentType:'application/pdf'}),new Promise((_,rej)=>setTimeout(()=>rej(new Error('t/o')),8000))]);return await ref.getDownloadURL();}catch(e){return null;}}
function printPDF(bill,flat){ensureJsPDF().then(ok=>{if(!ok)return;const doc=buildReceiptPDF(bill,flat);if(!doc)return;if(/iPhone|iPad|Android/i.test(navigator.userAgent)){doc.save('Receipt_'+bill.receiptNo+'.pdf');showToast('PDF saved!');}else{const url=URL.createObjectURL(doc.output('blob'));window.open(url,'_blank');setTimeout(()=>URL.revokeObjectURL(url),60000);}});}
function waRcptWithLink(flat,bill,link){return 'PAYMENT RECEIVED - Supreme Limra Society\n\nDear '+flat.ownerName+',\nReceipt #'+bill.receiptNo+' | Flat '+flat.flatNo+'\nMonth: '+MO[bill.month-1]+' '+bill.year+'\nAmount: Rs.'+bill.amount+'/- | '+bill.paidDate+'\nMode: '+bill.paymentMode+'\n\nDownload PDF Receipt:\n'+link+'\n\nThank you! - Supreme Limra Society';}
function goToWA(mobile,msg){const n=mobile.replace(/[^0-9]/g,'');window.location.href='https://wa.me/'+(n.startsWith('91')?n:'91'+n)+'?text='+encodeURIComponent(msg);}

function generateMonthlyExcel(month, year){
  if(typeof XLSX === 'undefined'){
    showToast('Loading Excel library...','ok');
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>generateMonthlyExcel(month,year);
    s.onerror=()=>showToast('Could not load Excel library','err');
    document.head.appendChild(s);
    return;
  }

  const wb = XLSX.utils.book_new();
  const mn = MO[month-1];
  const ms = MS[month-1];

  // ── Sheet 1: Flat-wise Collection Register ───────────────────────────────
  const s1 = [];
  s1.push(['SUPREME LIMRA SOCIETY — MAINTENANCE REGISTER']);
  s1.push(['Sr. No. 15/16, Inam Nagar, Kondhwa Khurd, Pune – 411048']);
  s1.push([`Month: ${mn} ${year}`,'','','','',`Generated: ${new Date().toLocaleDateString('en-IN')}`]);
  s1.push([]);
  s1.push(['Flat No.','Owner Name','Maintenance','Status','Amount Paid','Payment Date','Mode','Receipt No.','Remarks']);

  const monthBills = S.bills.filter(b=>b.month===month&&b.year===year);
  let totalCollected=0, totalPending=0;

  // Sort flats in order
  const sortedFlats = [...S.flats].sort((a,b)=>a.flatNo.localeCompare(b.flatNo,undefined,{numeric:true}));

  sortedFlats.forEach(f=>{
    const bill = monthBills.find(b=>b.flatId===f.id);
    if(!bill){
      s1.push([f.flatNo, f.ownerName, f.maintenance, 'Not Generated', '', '', '', '', '']);
    } else if(bill.status==='paid'){
      totalCollected += bill.amount;
      s1.push([f.flatNo, f.ownerName, f.maintenance, 'PAID', bill.amount, bill.paidDate, bill.paymentMode||'', '#'+bill.receiptNo, '']);
    } else {
      totalPending += bill.maintenance || f.maintenance;
      s1.push([f.flatNo, f.ownerName, f.maintenance, 'PENDING', '', '', '', '', '']);
    }
  });

  s1.push([]);
  s1.push(['', '', 'TOTAL', '', totalCollected, '', '', '', '']);
  s1.push(['', '', 'PENDING', '', totalPending, '', '', '', '']);
  s1.push(['', '', 'TOTAL FLATS', S.flats.length, '', '', '', '', '']);

  const ws1 = XLSX.utils.aoa_to_sheet(s1);

  // Set column widths
  ws1['!cols'] = [{wch:10},{wch:28},{wch:14},{wch:12},{wch:14},{wch:14},{wch:12},{wch:12},{wch:16}];

  // Style header rows
  ws1['!merges'] = [
    {s:{r:0,c:0},e:{r:0,c:8}},
    {s:{r:1,c:0},e:{r:1,c:8}},
  ];

  XLSX.utils.book_append_sheet(wb, ws1, `${ms}-${String(year).slice(-2)} Collections`);

  // ── Sheet 2: Expense Register ─────────────────────────────────────────────
  const s2 = [];
  s2.push(['SUPREME LIMRA SOCIETY — EXPENSE REGISTER']);
  s2.push([`Month: ${mn} ${year}`]);
  s2.push([]);
  s2.push(['Sr.','Date','Description','Category','Amount (₹)','Paid By / Notes']);

  const monthExp = (S.expenses||[]).filter(e=>{
    const d=new Date(e.date);
    return d.getMonth()+1===month && d.getFullYear()===year;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));

  let totalExp = 0;
  monthExp.forEach((e,i)=>{
    totalExp += e.amount;
    s2.push([i+1, new Date(e.date).toLocaleDateString('en-IN'), e.description, e.category, e.amount, e.notes||'']);
  });

  s2.push([]);
  s2.push(['','','','TOTAL EXPENSES', totalExp, '']);

  if(monthExp.length===0){
    s2.push(['','','No expenses recorded for this month','','','']);
  }

  // Category-wise breakdown
  s2.push([]);
  s2.push(['Category Breakdown','','','','','']);
  const cats = {};
  monthExp.forEach(e=>{ cats[e.category]=(cats[e.category]||0)+e.amount; });
  Object.entries(cats).forEach(([cat,amt])=>{
    s2.push(['', cat, '', '', amt, '']);
  });

  const ws2 = XLSX.utils.aoa_to_sheet(s2);
  ws2['!cols'] = [{wch:6},{wch:14},{wch:35},{wch:16},{wch:14},{wch:30}];
  ws2['!merges'] = [{s:{r:0,c:0},e:{r:0,c:5}}];

  XLSX.utils.book_append_sheet(wb, ws2, `${ms}-${String(year).slice(-2)} Expenses`);

  // ── Sheet 3: Balance Summary ──────────────────────────────────────────────
  const s3 = [];
  s3.push(['SUPREME LIMRA SOCIETY — MONTHLY BALANCE SHEET']);
  s3.push([`Month: ${mn} ${year}`]);
  s3.push([]);
  s3.push(['INCOME','','']);
  s3.push(['Maintenance Collected', '', totalCollected]);
  s3.push(['Pending (not yet paid)', '', totalPending]);
  s3.push(['Total Billed', '', totalCollected+totalPending]);
  s3.push([]);
  s3.push(['EXPENSES','','']);
  
  const cats2 = {};
  monthExp.forEach(e=>{ cats2[e.category]=(cats2[e.category]||0)+e.amount; });
  Object.entries(cats2).forEach(([cat,amt])=>{
    s3.push([cat,'',amt]);
  });
  if(Object.keys(cats2).length===0) s3.push(['No expenses this month','',0]);
  
  s3.push(['Total Expenses','',totalExp]);
  s3.push([]);
  s3.push(['NET BALANCE (Collected - Expenses)','',totalCollected-totalExp]);
  s3.push([]);
  s3.push(['Outstanding dues from previous months']);

  // Add per-flat outstanding
  const outstandingFlats = S.flats.map(f=>{
    const pending = S.bills.filter(b=>b.flatId===f.id&&b.status==='pending');
    const amt = pending.reduce((s,b)=>s+b.amount,0);
    return {f, amt, cnt:pending.length};
  }).filter(x=>x.amt>0).sort((a,b)=>b.amt-a.amt);

  if(outstandingFlats.length>0){
    s3.push(['Flat No.','Owner','Outstanding Amount','Months Pending']);
    outstandingFlats.forEach(({f,amt,cnt})=>{
      s3.push([f.flatNo, f.ownerName, amt, cnt+' month'+(cnt>1?'s':'')]);
    });
    s3.push(['TOTAL OUTSTANDING','',outstandingFlats.reduce((s,x)=>s+x.amt,0),'']);
  } else {
    s3.push(['All dues cleared ✓','','','']);
  }

  const ws3 = XLSX.utils.aoa_to_sheet(s3);
  ws3['!cols'] = [{wch:35},{wch:20},{wch:16},{wch:16}];
  ws3['!merges'] = [{s:{r:0,c:0},e:{r:0,c:3}}];

  XLSX.utils.book_append_sheet(wb, ws3, `${ms}-${String(year).slice(-2)} Balance`);

  // ── Download ──────────────────────────────────────────────────────────────
  const fname = `SupremeLimra_${mn}_${year}_Report.xlsx`;
  XLSX.writeFile(wb, fname);
  showToast(`${mn} ${year} Excel report downloaded ✓`,'ok');
}

document.addEventListener('click',function(e){
  // Close modal when clicking the dark overlay background (not the modal card itself)
  if(e.target.id==='modal-ov'){S.modal=null;render();return;}

  const el=e.target.closest('[data-action]');
  if(!el)return;
  const a=el.dataset.action,id=el.dataset.id||'';
  
  if(a==='login'){
    const pin=document.getElementById('pin-input')?.value||'';
    const lbtn=document.querySelector('[data-action="login"]');
    const enableBtn=()=>{if(lbtn){lbtn.textContent='Unlock App';lbtn.disabled=false;}};
    const showErr=(msg)=>{const err=document.getElementById('pin-err');if(err){err.textContent=msg;setTimeout(()=>{err.textContent='';},3000);}};
    if(lbtn){lbtn.textContent='Checking...';lbtn.disabled=true;}
    DB.loginUser(pin)
      .then(result=>{
        if(result.ok){
          loadData().then(()=>render()).catch(e=>{console.log('loadData err:',e);render();});
        } else {
          showErr(result.msg||'Wrong password');
          enableBtn();
        }
      })
      .catch(e=>{
        // Should never reach here but safety net
        console.log('Login catch:',e);
        showErr('Login error: '+(e.message||e.code||'check internet and try again'));
        enableBtn();
      });
    return;
  }
  if(a==='logout'){if(confirm('Logout from the app?')){LS.logout();render();} return;}
  if(a==='tab'){S.tab=el.dataset.tab;S.modal=null;render();return;}
  if(a==='close-modal'){S.modal=null;render();return;}
  
  // Flat actions
  if(a==='add-flat'){S.modal={type:'flatForm',data:null};render();return;}
  if(a==='edit-flat'){S.modal={type:'flatForm',data:S.flats.find(f=>f.id===id)};render();return;}
  if(a==='del-flat'){if(confirm('Delete this flat and all its bills?')){S.flats=S.flats.filter(f=>f.id!==id);S.bills=S.bills.filter(b=>b.flatId!==id);saveFlats();saveBills();showToast('Flat deleted');}return;}
  if(a==='save-flat'){
    const no=document.getElementById('ff-no')?.value.trim();
    const name=document.getElementById('ff-name')?.value.trim();
    const mob=document.getElementById('ff-mob')?.value.trim();
    const floor=document.getElementById('ff-floor')?.value.trim();
    const maint=+(document.getElementById('ff-maint')?.value||1000);
    if(!no){alert('Flat number required');return;}
    if(!name){alert('Owner name required');return;}
    const data={flatNo:no,ownerName:name,mobile:mob,floor,maintenance:maint};
    if(id){S.flats=S.flats.map(f=>f.id===id?{...data,id}:f);showToast('Flat updated ✓');}
    else{S.flats.push({...data,id:uid()});showToast('Flat added ✓');}
    saveFlats();S.modal=null;render();return;
  }
  
  // Bills
  if(a==='open-gen'){S.modal={type:'genBills'};render();return;}
  if(a==='do-gen'){
    const m=+(document.getElementById('gen-month')?.value||S.bf.month);
    const y=+(document.getElementById('gen-year')?.value||S.bf.year);
    const wa=document.getElementById('gen-wa')?.checked;
    const existing=S.bills.filter(b=>b.month===m&&b.year===y);
    const nf=S.flats.filter(f=>!existing.find(b=>b.flatId===f.id));
    if(!nf.length){showToast('Bills already generated for all flats','err');return;}
    const nb=nf.map(f=>({id:uid(),flatId:f.id,month:m,year:y,amount:f.maintenance,status:'pending',receiptNo:null,paidDate:null,paymentMode:null,generatedDate:new Date().toLocaleDateString('en-IN')}));
    S.bills=[...S.bills,...nb];saveBills();S.bf.month=m;S.bf.year=y;
    if(wa){const eligible=nb.filter(b=>S.flats.find(f=>f.id===b.flatId)?.mobile);if(eligible.length){S.modal={type:'waFlow',data:{bills:eligible,step:'send',idx:0,done:[]}};showToast(`${nb.length} bills generated ✓`);render();return;}}
    showToast(`${nb.length} bills generated ✓`);S.modal=null;render();return;
  }
  if(a==='open-pay'){const b=S.bills.find(x=>x.id===id);if(b){S.modal={type:'payment',data:b};render();}return;}
  if(a==='do-pay'){
    const b=S.bills.find(x=>x.id===id);if(!b)return;
    const amt=+(document.getElementById('pay-amt')?.value||0);
    const date=document.getElementById('pay-date')?.value;
    const mode=document.getElementById('pay-mode')?.value||'Cash';
    if(!amt){alert('Enter amount');return;}
    const lastRcpt=S.bills.reduce((mx,b)=>Math.max(mx,+(b.receiptNo||0)),0);
    const updated={...b,status:'paid',amount:amt,paidDate:new Date(date).toLocaleDateString('en-IN'),paymentMode:mode,receiptNo:String(lastRcpt+1).padStart(4,'0')};
    S.bills=S.bills.map(x=>x.id===id?updated:x);saveBills();
    showToast('Payment recorded ✓');S.modal={type:'receipt',data:updated};render();return;
  }
  if(a==='open-receipt'){const b=S.bills.find(x=>x.id===id);if(b){S.modal={type:'receipt',data:b};S._pdfUrl=null;S._pdfUploading=true;render();if(FB_READY&&_fbST){uploadReceiptAndGetLink(b,flatOf(b)).then(url=>{S._pdfUrl=url;S._pdfUploading=false;updateReceiptHint();}).catch(()=>{S._pdfUploading=false;updateReceiptHint();});}else{S._pdfUploading=false;}}return;}
  if(a==='print-pdf'){const b=S.bills.find(x=>x.id===id)||S.modal?.data;if(b){printPDF(b,flatOf(b));showToast('Opening PDF…','pdf');}return;}
  
  // WhatsApp
  if(a==='wa-bill'){const b=S.bills.find(x=>x.id===id);if(b){const f=flatOf(b);showToast('Opening WhatsApp…','wa');sendBillOnWA(b,f);}return;}
  if(a==='wa-open-now'){const b=S.bills.find(x=>x.id===id)||S.modal?.data?.bill;if(b){const f=flatOf(b);S.modal=null;render();setTimeout(()=>{openWA(f.mobile,waRcpt(f,b));},300);}return;}
  if(a==='wa-rcpt'){
    const b=S.bills.find(x=>x.id===id)||S.modal?.data;if(!b)return;
    const f=flatOf(b);const msg=S._pdfUrl?waRcptWithLink(f,b,S._pdfUrl):waRcpt(f,b);
    if(window.jspdf&&typeof navigator.share==='function'){
      try{const doc=buildReceiptPDF(b,f);if(doc){const blob=doc.output('blob');const file=new File([blob],'Receipt_'+b.receiptNo+'.pdf',{type:'application/pdf'});if(navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],title:'Receipt',text:msg}).then(()=>showToast('Shared!','wa')).catch(err=>{if(err.name!=='AbortError')goToWA(f.mobile,msg);});return;}}}catch(err){}
    }
    goToWA(f.mobile,msg);showToast('Opening WhatsApp...','wa');return;
  }
  if(a==='bulk-wa'){
    const pend=S.bills.filter(b=>b.month===S.bf.month&&b.year===S.bf.year&&b.status==='pending'&&flatOf(b).mobile);
    if(!pend.length){showToast('No pending bills with mobile numbers','err');return;}
    S.modal={type:'waFlow',data:{bills:pend,step:'send',idx:0,done:[]}};render();return;
  }
  if(a==='wa-start'){if(S.modal?.data){S.modal.data.step='send';S.modal.data.idx=0;S.modal.data.done=[];}render();return;}
  if(a==='wa-next'){
    const d=S.modal?.data;if(!d)return;
    if(d.idx>=d.bills.length)return;
    const bill=d.bills[d.idx];const f=flatOf(bill);
    sendBillOnWA(bill,f);
    d.done=[...d.done,bill.id];d.idx++;
    render();return;
  }
  
  // Settings
  if(a==='change-pin'){S.modal={type:'changePin'};render();return;}
  if(a==='do-change-pin'){
    const old=document.getElementById('pin-old')?.value;
    const nw=document.getElementById('pin-new')?.value;
    const cfm=document.getElementById('pin-cfm')?.value;
    const err=document.getElementById('pin-change-err');
    if(old!==DB.getPin()){if(err)err.textContent='Current password is wrong.';return;}
    if(!nw||nw.length<4){if(err)err.textContent='New PIN must be at least 4 digits.';return;}
    if(nw!==cfm){if(err)err.textContent='PINs do not match.';return;}
    LS.setPin(nw);showToast('PIN changed successfully ✓');S.modal=null;render();return;
  }
  if(a==='force-refresh'){if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(regs=>{Promise.all(regs.map(r=>r.unregister())).then(()=>{caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k)))).then(()=>{showToast('Reloading...','ok');setTimeout(()=>window.location.reload(true),800);});});});}else window.location.reload(true);return;}
  if(a==='add-expense'){S.modal={type:'addExpense',data:{cat:'',desc:''}};render();return;}
  if(a==='quick-expense'){
    const cat=el.dataset.cat||'';
    S.modal={type:'addExpense',data:{cat,desc:''}};render();return;
  }
  if(a==='save-expense'){
    const desc=document.getElementById('exp-desc')?.value.trim();
    const amt=+(document.getElementById('exp-amt')?.value||0);
    const date=document.getElementById('exp-date')?.value;
    const cat=document.getElementById('exp-cat')?.value||'Miscellaneous 📦';
    const note=document.getElementById('exp-note')?.value.trim();
    if(!cat||cat===''){alert('Please select a category');return;}
    if(!desc){alert('Description required');return;}
    if(!amt||amt<=0){alert('Enter a valid amount');return;}
    if(!date){alert('Date required');return;}
    if(!S.expenses)S.expenses=[];
    S.expenses.push({id:uid(),description:desc,amount:amt,date,category:cat,notes:note,addedDate:new Date().toISOString()});
    saveExpenses();showToast('Expense saved ✓');S.modal=null;render();return;
  }
  if(a==='del-expense'){
    if(!confirm('Delete this expense?'))return;
    S.expenses=(S.expenses||[]).filter(e=>e.id!==id);
    saveExpenses();showToast('Expense deleted');render();return;
  }
  if(a==='gen-monthly-excel'||a==='open-monthly-excel'){openMonthlyExcelModal();return;}
  if(a==='do-gen-excel'){
    const m=+(document.getElementById('xls-month')?.value||now.getMonth()+1);
    const y=+(document.getElementById('xls-year')?.value||now.getFullYear());
    S.modal=null;render();
    setTimeout(()=>generateMonthlyExcel(m,y),200);
    return;
  }
  if(a==='export-data'){exportData();return;}
  if(a==='import-trigger'){document.getElementById('import-file')?.click();return;}
});

// Handle Enter key in PIN input
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    const pi=document.getElementById('pin-input');
    if(pi===document.activeElement){document.querySelector('[data-action="login"]')?.click();}
  }
});

  render();
  setTimeout(async function(){
    initFirebase();
    await loadData();
    render();
    // Auto-show monthly Excel modal on 25th (once per day)
    if(new Date().getDate()===25 && !sessionStorage.getItem('excel25shown')){
      sessionStorage.setItem('excel25shown','1');
      setTimeout(()=>{S.modal={type:'monthlyExcel'};render();},1500);
    }
  }, 300);
});
