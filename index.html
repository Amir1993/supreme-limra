function numToWords(n){
  if(!n)return'Zero Only';
  const o=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const t=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function c(x){if(x<20)return o[x];if(x<100)return t[Math.floor(x/10)]+(x%10?' '+o[x%10]:'');if(x<1000)return o[Math.floor(x/100)]+' Hundred'+(x%100?' '+c(x%100):'');if(x<100000)return c(Math.floor(x/1000))+' Thousand'+(x%1000?' '+c(x%1000):'');if(x<10000000)return c(Math.floor(x/100000))+' Lakh'+(x%100000?' '+c(x%100000):'');return c(Math.floor(x/10000000))+' Crore'+(x%10000000?' '+c(x%10000000):'');}
  return c(n)+' Only';
}

// Falls back to wa.me link if Web Share API unavailable
// ════════════════════════════════════════════════════
// Dynamically load jsPDF if not yet available
function ensureJsPDF(){
  return new Promise(resolve=>{
    if(window.jspdf){resolve(true);return;}
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=()=>resolve(true);
    s.onerror=()=>resolve(false);
    document.head.appendChild(s);
  });
}

async function shareReceiptOnWA(bill, flat) {
  const text = waRcpt(flat, bill);
  showToast('Preparing receipt image…','wa');

  // ── Capture receipt preview as PNG image ──────────────────────────────
  // The .rct-p element is currently visible in the receipt modal
  const receiptEl = document.querySelector('.rct-p');

  if(receiptEl && typeof html2canvas === 'function'){
    try{
      // Capture the receipt HTML element as a high-quality PNG
      const canvas = await html2canvas(receiptEl,{
        scale:2,                     // 2x for crisp quality
        useCORS:true,
        backgroundColor:'#ffffff',
        logging:false,
        removeContainer:true
      });

      // Convert canvas to PNG blob
      const blob = await new Promise(r=>canvas.toBlob(r,'image/png',0.97));
      const imgDataUrl = canvas.toDataURL('image/png',0.97);
      const imgFile = new File([blob],'Receipt_'+bill.receiptNo+'_Flat_'+flat.flatNo+'.png',{type:'image/png'});

      // ── Try 1: Web Share API with image file (1-tap on HTTPS / some local setups)
      if(navigator.canShare && navigator.canShare({files:[imgFile]})){
        try{
          await navigator.share({files:[imgFile],title:'Receipt #'+bill.receiptNo,text});
          return; // SUCCESS — share sheet opened with image
        }catch(e){
          if(e.name==='AbortError')return; // user cancelled share sheet
        }
      }

      // ── Try 2: Also try PDF alongside (belt & suspenders on HTTPS)
      const pdfLoaded = await ensureJsPDF();
      if(pdfLoaded){
        const doc = buildReceiptPDF(bill,flat);
        if(doc){
          const pdfBlob = doc.output('blob');
          const pdfFile = new File([pdfBlob],'Receipt_'+bill.receiptNo+'.pdf',{type:'application/pdf'});
          if(navigator.canShare && navigator.canShare({files:[pdfFile]})){
            try{
              await navigator.share({files:[pdfFile],title:'Receipt #'+bill.receiptNo,text});
              return;
            }catch(e){if(e.name==='AbortError')return;}
          }
        }
      }

      // ── Fallback: Show image in modal — user long-presses to save then shares
      if(S._lastImgUrl) try{URL.revokeObjectURL(S._lastImgUrl);}catch(err){}
      S._lastImgUrl = URL.createObjectURL(blob);
      S.modal = {type:'imgGuide', data:{bill,flat,imgDataUrl,text}};
      render();
      return;

    }catch(err){
      console.log('html2canvas error:',err);
    }
  }

  // ── Ultimate fallback: text-only WhatsApp ─────────────────────────────
  if(flat.mobile) openWA(flat.mobile, text);
}

async function sendBillOnWA(bill, flat) {
  const text = waMsg(flat, bill);
  if(typeof navigator.share==='function'){
    try{
      await navigator.share({title:'Supreme Limra – Maintenance Bill',text});
      return;
    }catch(e){if(e.name==='AbortError')return;}
  }
  if(flat.mobile) openWA(flat.mobile, text);
}

function printPDF(bill,flat){
  ensureJsPDF().then(loaded=>{
    if(!loaded){showToast('PDF library not loaded','err');return;}
    const doc=buildReceiptPDF(bill,flat);
    if(!doc){showToast('Could not generate PDF','err');return;}
    const isMobile=/iPhone|iPad|Android/i.test(navigator.userAgent);
    if(isMobile){
      doc.save('Receipt_'+bill.receiptNo+'_Flat'+String(flat.flatNo).replace(/[/]/g,'_')+'.pdf');
      showToast('PDF saved to Downloads ✓','ok');
    } else {
      const blob=doc.output('blob');
      const url=URL.createObjectURL(blob);
      const win=window.open(url,'_blank');
      if(win){setTimeout(()=>{try{URL.revokeObjectURL(url);}catch(e){}},60000);}
      else{doc.save('Receipt_'+bill.receiptNo+'_Flat'+String(flat.flatNo).replace(/[/]/g,'_')+'.pdf');showToast('PDF downloaded ✓','ok');}
    }
  });
}

function goToWA(mobile,msg){
  const n=mobile.replace(/[^0-9]/g,"");
  // If number is 10 digits → Indian, add 91. If already has country code (>10 digits) → use as-is
  const phone=n.length===10?"91"+n:n;
  window.location.href="https://wa.me/"+phone+"?text="+encodeURIComponent(msg);
}

function openWA(mobile,msg){
  const n=mobile.replace(/\D/g,'');
  const url='https://wa.me/'+(n.startsWith('91')?n:'91'+n)+'?text='+encodeURIComponent(msg);
  const a=document.createElement('a');
  a.href=url;a.target='_blank';a.rel='noopener noreferrer';
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{try{document.body.removeChild(a);}catch(e){}},1000);
}

function importData(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.flats||!data.bills)throw new Error('Invalid backup file');
      if(!confirm('This will REPLACE all current data with backup. Are you sure?'))return;
      S.flats=data.flats;S.bills=data.bills;
      saveFlats();saveBills();
      showToast('Data restored successfully ✓');
      S.modal=null;render();
    }catch(err){showToast('Invalid backup file!','err');}
  };
  reader.readAsText(file);
}

  }).join('');
  const banner=pendBills.length&&(bf.status==='all'||bf.status==='pending')?`<div class="wa-banner"><p style="margin:0"><strong>💬 WhatsApp — ${pendBills.length} pending owner${pendBills.length>1?'s':''}</strong><br><span style="font-size:11px;opacity:.8">Send bill reminders in one go</span></p><button class="btn" style="background:#fff;color:#075e54;font-weight:700;font-size:12px;padding:8px 12px;border-radius:10px;flex-shrink:0" data-action="bulk-wa">Send All 💬</button></div>`:'';
  const isFirst = now.getDate()===1;
  const isOverdue5 = (b) => {
    if(b.status!=='pending') return false;
    const gen = S.bills.find(x=>x.id===b.id);

    const parts = gen.generatedDate.split('/');

</div>`:''}

  </div>`:''}

${allBills.length?`<div class="crd">${rows}</div>`:`<div class="crd"><div class="emp"><div class="emp-icon">📄</div><p>No bills for ${MO[bf.month-1]} ${bf.year}.<br>Tap <strong>+ Generate</strong> to create.</p></div></div>`}`;

function renderReports(){
  const ry=S.ry;
  const yrs=[...new Set([...S.bills.map(b=>b.year),now.getFullYear()])].sort((a,b)=>b-a);
  const yb=S.bills.filter(b=>b.year===ry);
  const yc=yb.filter(b=>b.status==='paid').reduce((s,b)=>s+b.amount,0);
  const yp=yb.filter(b=>b.status==='pending').reduce((s,b)=>s+b.amount,0);
  const mo=MO.map((m,i)=>{const mb=yb.filter(b=>b.month===i+1);return{name:m.slice(0,3),c:mb.filter(b=>b.status==='paid').reduce((s,b)=>s+b.amount,0),p:mb.filter(b=>b.status==='pending').reduce((s,b)=>s+b.amount,0)};});
  const mx=Math.max(...mo.map(m=>m.c+m.p),1);
  const mRows=mo.filter(m=>m.c||m.p).map(m=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:600;color:var(--tx);width:32px">${m.name}</span><div style="display:flex;gap:10px"><span style="color:var(--gr);font-weight:600">${fmt(m.c)}</span>${m.p?`<span style="color:var(--re)">+${fmt(m.p)} due</span>`:''}</div></div><div class="pb"><div class="pf" style="width:${(m.c/mx)*100}%"></div></div></div>`).join('');
  const def=S.flats.map(f=>{const pb=S.bills.filter(b=>b.flatId===f.id&&b.status==='pending');return{f,amt:pb.reduce((s,b)=>s+b.amount,0),cnt:pb.length};}).filter(x=>x.amt>0).sort((a,b)=>b.amt-a.amt);
  const defRows=def.map(({f,amt,cnt})=>`<div class="li"><div class="fb" style="background:var(--re);font-size:11px">${esc(f.flatNo)}</div><div class="ii"><div class="iname">${esc(f.ownerName)}</div><div class="isub">${cnt} month${cnt>1?'s':''} · 📱 ${f.mobile||'—'}</div></div><span style="font-family:var(--serif);font-weight:700;font-size:16px;color:var(--re)">${fmt(amt)}</span></div>`).join('');
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="stt" style="margin-bottom:0">Reports</span><select class="inp" style="width:auto;padding:6px 32px 6px 10px;font-size:14px" onchange="S.ry=+this.value;render()">${yrs.map(y=>`<option value="${y}" ${ry===y?'selected':''}>${y}</option>`).join('')}</select></div>
<div class="sg"><div class="sc"><div class="sl">Year Collected</div><div class="sv" style="color:var(--gr);font-size:20px">${fmt(yc)}</div></div><div class="sc"><div class="sl">Year Pending</div><div class="sv" style="color:var(--re);font-size:20px">${fmt(yp)}</div></div></div>
<div class="crd"><div class="stt">Monthly Summary — ${ry}</div>${mRows||`<p style="color:var(--mu);font-size:13px;text-align:center;padding:12px 0">No data for ${ry}</p>`}</div>
${def.length?`<div class="crd"><div class="stt">🔴 Outstanding Dues</div>${defRows}</div>`:''}`;
}

  if(m.type==='flatForm') body=renderFlatForm(m.data);
  else if(m.type==='genBills') body=renderGenBills();
  else if(m.type==='payment') body=renderPayment(m.data);
  else if(m.type==='receipt') body=renderReceipt(m.data);
  else if(m.type==='waFlow') body=renderWAFlow(m.data);
  else if(m.type==='changePin') body=renderChangePin();
  else if(m.type==='pdfGuide') body=renderPdfGuide(m.data);
  else if(m.type==='imgGuide') body=renderImgGuide(m.data);
  else if(m.type==='waReady') body=renderWaReady(m.data);
  else if(m.type==='yearEnd') body=renderYearEnd(m.data);
  else if(m.type==='addExpense') body=renderAddExpense(m.data?.cat||'',m.data?.desc||'');
  else if(m.type==='flatHistory') body=renderFlatHistory(m.data);
  else if(m.type==='installGuide') body=renderInstallGuide();

  else if(m.type==='changeAdminPin') body=renderChangeAdminPin();
  return`<div class="mbox" id="modal-box"><div class="mdrag"></div>${body}</div>`;

function renderReceipt(bill){
  const f=flatOf(bill);
  const extras=bill.extras||[];
  const base=bill.maintenance_base||(extras.length?bill.amount-extras.reduce((s,e)=>s+e.amount,0):bill.amount);
  // Build item rows: row 1 = base maintenance, then extras in order, then blank rows
  const itemList=[
    {sr:1,l:'Maintenance Charges',x:MS[bill.month-1]+'-'+String(bill.year).slice(-2),a:base},
    ...extras.map((e,i)=>({sr:i+2,l:e.description,a:e.amount})),
  ];
  // Fill remaining slots up to 15
  for(let i=itemList.length+1;i<=15;i++) itemList.push({sr:i,l:i===2&&!extras.length?'Entrance Fees':i===3?'Interest On Defaulted Dues':i===4?'Contribution Towards Construction':i===5?'Lease Rent':i===6?'Municipal Taxes':i===7?'Water Charges':i===8?'Electricity Charges':i===9?'Parking Charges':i===10?'Lift Charges':i===11?'Service Charges':i===12?'Miscellaneous':i===13?'Terrace Charge':'',a:undefined});
  const items=itemList.slice(0,15);
  const trs=items.map(i=>`<tr>
    <td class="sr">${i.sr}</td>
    <td style="font-size:10px">${esc(i.l||'')}${i.x?`&nbsp;<strong style="color:#0f2040;font-size:10.5px">${i.x}</strong>`:''}</td>
    <td class="am">${i.a?i.a+'/-':''}</td>
  </tr>`).join('');
  return`<div class="mttl" style="font-size:18px;margin-bottom:12px">🧾 Payment Receipt</div>
<div class="rct-p" id="receipt-capture">
  <div class="rp-paid-stamp">PAID</div>
  <div class="rp-h">
    <h2>SUPREME LIMRA</h2>
    <p>${ADDR_P}</p>
    <div class="rp-tag">✦ MAINTENANCE RECEIPT ✦</div>
  </div>
  <div class="rp-gold-bar"></div>
  <div class="rp-m">
    <div class="rp-mi">
      <div class="rp-ml">
        <div>Received from Mr./Mrs./Ms.&nbsp;<span class="rp-fv">${esc(f.ownerName)}</span></div>
        <div>Flat No.:&nbsp;<span class="rp-fv">${esc(f.flatNo)}</span></div>
        <div class="rp-note">On account of the particulars stated below</div>
      </div>
      <div class="rp-mr">
        <span class="rno-lbl">Receipt No.</span>

function generateMonthlyExcel(month,year){
  if(typeof XLSX==='undefined'){
    const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>generateMonthlyExcel(month,year);s.onerror=()=>showToast('Excel library failed','err');
    document.head.appendChild(s);showToast('Loading Excel library...','ok');return;
  }
  const wb=XLSX.utils.book_new(),mn=MO[month-1],ms2=MS[month-1];
  const monthBills=S.bills.filter(b=>b.month===month&&b.year===year);
  const sortedFlats=[...S.flats].sort((a,b)=>a.flatNo.localeCompare(b.flatNo,undefined,{numeric:true}));
  let totalCol=0,totalPend=0;
  const s1=[['SUPREME LIMRA SOCIETY — MAINTENANCE REGISTER'],['Sr. No. 15/16, Inam Nagar, Kondhwa Khurd, Pune – 411048'],[`Month: ${mn} ${year}`,``,``,``,``,`Generated: ${new Date().toLocaleDateString('en-IN')}`],[],['Flat No.','Owner Name','Maintenance (₹)','Status','Amount Paid','Payment Date','Mode','Receipt No.']];
  sortedFlats.forEach(f=>{const b=monthBills.find(x=>x.flatId===f.id);if(!b){s1.push([f.flatNo,f.ownerName,f.maintenance,'Not Generated','','','','']);}else if(b.status==='paid'){totalCol+=b.amount;s1.push([f.flatNo,f.ownerName,f.maintenance,'PAID',b.amount,b.paidDate,b.paymentMode||'','#'+b.receiptNo]);}else{totalPend+=f.maintenance;s1.push([f.flatNo,f.ownerName,f.maintenance,'PENDING','','','','']);}});
  s1.push([]);s1.push(['','','TOTAL COLLECTED','',totalCol,'','','']);s1.push(['','','TOTAL PENDING','',totalPend,'','','']);
  const ws1=XLSX.utils.aoa_to_sheet(s1);ws1['!cols']=[{wch:10},{wch:28},{wch:14},{wch:12},{wch:14},{wch:14},{wch:12},{wch:12}];
  ws1['!merges']=[{s:{r:0,c:0},e:{r:0,c:7}},{s:{r:1,c:0},e:{r:1,c:7}}];
  XLSX.utils.book_append_sheet(wb,ws1,`${ms2}-${String(year).slice(-2)} Collections`);
  const monthExp=(S.expenses||[]).filter(e=>{const d=new Date(e.date);return d.getMonth()+1===month&&d.getFullYear()===year;}).sort((a,b)=>new Date(a.date)-new Date(b.date));
  let totalExp=0;
  const s2=[['SUPREME LIMRA SOCIETY — EXPENSE REGISTER'],[`Month: ${mn} ${year}`],[],['Sr.','Date','Description','Category','Amount (₹)','Paid By / Notes']];
  monthExp.forEach((e,i)=>{totalExp+=e.amount;s2.push([i+1,new Date(e.date).toLocaleDateString('en-IN'),e.description,e.category,e.amount,e.notes||'']);});
  s2.push([]);s2.push(['','','','TOTAL EXPENSES',totalExp,'']);
  const ws2=XLSX.utils.aoa_to_sheet(s2);ws2['!cols']=[{wch:6},{wch:14},{wch:35},{wch:16},{wch:14},{wch:30}];
  ws2['!merges']=[{s:{r:0,c:0},e:{r:0,c:5}}];
  XLSX.utils.book_append_sheet(wb,ws2,`${ms2}-${String(year).slice(-2)} Expenses`);
  const s3=[['SUPREME LIMRA SOCIETY — BALANCE SHEET'],[`Month: ${mn} ${year}`],[],['INCOME','',''],['Maintenance Collected','',totalCol],['Still Pending','',totalPend],['Total Billed','',totalCol+totalPend],[],['EXPENSES','','']];
  const cats={};monthExp.forEach(e=>{cats[e.category]=(cats[e.category]||0)+e.amount;});
  Object.entries(cats).forEach(([c,a])=>s3.push([c,'',a]));
  s3.push(['Total Expenses','',totalExp]);s3.push([]);s3.push(['NET BALANCE (Collected - Expenses)','',totalCol-totalExp]);
  const outstanding=S.flats.map(f=>{const pb=S.bills.filter(b=>b.flatId===f.id&&b.status==='pending');return{f,amt:pb.reduce((s,b)=>s+b.amount,0),cnt:pb.length};}).filter(x=>x.amt>0);
  if(outstanding.length){s3.push([]);s3.push(['OUTSTANDING DUES','','']);s3.push(['Flat No.','Owner','Amount','Months']);outstanding.forEach(({f,amt,cnt})=>s3.push([f.flatNo,f.ownerName,amt,cnt+' month'+(cnt>1?'s':'')]));s3.push(['TOTAL OUTSTANDING','',outstanding.reduce((s,x)=>s+x.amt,0)]);}
  const ws3=XLSX.utils.aoa_to_sheet(s3);ws3['!cols']=[{wch:30},{wch:20},{wch:16},{wch:14}];ws3['!merges']=[{s:{r:0,c:0},e:{r:0,c:3}}];

function generateDefaulterPDF(){
  if(!window.jspdf){ensureJsPDF().then(ok=>ok&&generateDefaulterPDF());return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
  const W=210,mx=15,rw=180;let y=15;

  // Header
  doc.setFillColor(15,32,64);doc.rect(mx,y,rw,28,'F');
  doc.setFillColor(201,147,42);doc.rect(mx,y+28,rw,1.5,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(18);doc.setTextColor(255,255,255);
  doc.text('SUPREME LIMRA SOCIETY',W/2,y+10,{align:'center'});
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(201,147,42);
  doc.text('Sr. No. 15, Inaam Nagar, Kondhwa Khurd, Pune - 411048',W/2,y+18,{align:'center'});
  doc.setFontSize(8);doc.setTextColor(180,160,100);
  doc.text('DEFAULTER / OUTSTANDING DUES REPORT  —  Generated: '+new Date().toLocaleDateString('en-IN'),W/2,y+25,{align:'center'});
  y+=35;

  // Get all defaulters
  const defaulters=S.flats.map(f=>{
    const pb=S.bills.filter(b=>b.flatId===f.id&&b.status==='pending');
    return{f,bills:pb,total:pb.reduce((s,b)=>s+b.amount,0),months:pb.length};
  }).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);

  if(defaulters.length===0){
    doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(26,127,55);
    doc.text('All dues are cleared — No outstanding payments!',W/2,y+20,{align:'center'});
    doc.save('SupremeLimra_Defaulters_'+new Date().toLocaleDateString('en-IN').replace(/\//g,'-')+'.pdf');
    showToast('No defaulters — All dues cleared!','ok');
    return;
  }

  // Summary box
  const totalOut=defaulters.reduce((s,d)=>s+d.total,0);
  doc.setFillColor(255,245,245);doc.rect(mx,y,rw,18,'F');
  doc.setDrawColor(192,57,43);doc.setLineWidth(0.5);doc.rect(mx,y,rw,18);
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(192,57,43);
  doc.text('Total Defaulters: '+defaulters.length+' flats',mx+6,y+8);
  doc.text('Total Outstanding: Rs.'+totalOut.toLocaleString('en-IN')+'/-',mx+6,y+14);
  doc.setFontSize(10);doc.setTextColor(80,80,80);
  doc.text('Report Date: '+new Date().toLocaleDateString('en-IN'),mx+rw-6,y+8,{align:'right'});
  y+=24;

  // Table header
  const colW=[18,55,35,20,30,22];
  const hdrs=['Flat','Owner Name','Mobile','Months','Amount (₹)','Last Bill'];
  doc.setFillColor(15,32,64);doc.rect(mx,y,rw,9,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(255,255,255);
  let cx=mx;
  hdrs.forEach((hd,i)=>{doc.text(hd,cx+colW[i]/2,y+6.5,{align:'center'});cx+=colW[i];});
  y+=9;

  defaulters.forEach((d,idx)=>{
    if(y>265){doc.addPage();y=15;}
    const rowH=9;
    doc.setFillColor(idx%2===0?255:249,idx%2===0?255:249,idx%2===0?255:249);
    doc.rect(mx,y,rw,rowH,'F');
    doc.setDrawColor(220,215,205);doc.setLineWidth(0.2);
    cx=mx;colW.forEach(w=>{doc.rect(cx,y,w,rowH);cx+=w;});

    doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(15,32,64);
    doc.text(d.f.flatNo,mx+colW[0]/2,y+6.5,{align:'center'});
    doc.setFont('helvetica','normal');doc.setTextColor(20,20,20);
    doc.text(d.f.ownerName,mx+colW[0]+2,y+6.5);
    doc.text(d.f.mobile||'—',mx+colW[0]+colW[1]+colW[2]/2,y+6.5,{align:'center'});
    doc.setFont('helvetica','bold');doc.setTextColor(192,57,43);
    doc.text(String(d.months),mx+colW[0]+colW[1]+colW[2]+colW[3]/2,y+6.5,{align:'center'});
    doc.text(d.total.toLocaleString('en-IN'),mx+colW[0]+colW[1]+colW[2]+colW[3]+colW[4]-2,y+6.5,{align:'right'});
    // Last pending month
    const lastB=d.bills.sort((a,b)=>a.year-b.year||a.month-b.month)[0];
    doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);doc.setFontSize(7.5);
    doc.text(lastB?MS[lastB.month-1]+'-'+String(lastB.year).slice(-2):'—',mx+colW[0]+colW[1]+colW[2]+colW[3]+colW[4]+colW[5]/2,y+6.5,{align:'center'});
    y+=rowH;
  });

  // Total row
  doc.setFillColor(15,32,64);doc.rect(mx,y,rw,10,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(255,255,255);
  doc.text('TOTAL OUTSTANDING',mx+6,y+7);
  doc.setTextColor(201,147,42);
  doc.text('Rs.'+totalOut.toLocaleString('en-IN')+'/-',mx+rw-6,y+7,{align:'right'});
  y+=16;

  // Footer
  doc.setFont('helvetica','italic');doc.setFontSize(7.5);doc.setTextColor(150,150,150);
  doc.text('Computer Generated Report — Supreme Limra Society Management — '+new Date().getFullYear(),W/2,y,{align:'center'});

  doc.save('SupremeLimra_Defaulters_'+new Date().toLocaleDateString('en-IN').replace(/\//g,'-')+'.pdf');
  showToast('Defaulter PDF downloaded ✓','ok');
}

function generateFullDataExcel(){
  if(typeof XLSX==='undefined'){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>generateFullDataExcel();
    s.onerror=()=>showToast('Excel library failed','err');
    document.head.appendChild(s);showToast('Loading Excel library...','ok');return;
  }

  const wb=XLSX.utils.book_new();
  const sortedFlats=[...S.flats].sort((a,b)=>a.flatNo.localeCompare(b.flatNo,undefined,{numeric:true}));

  // ── Sheet 1: Summary Dashboard ─────────────────────────────────────────────
  const totalCollected=S.bills.filter(b=>b.status==='paid').reduce((s,b)=>s+b.amount,0);
  const totalPending=S.bills.filter(b=>b.status==='pending').reduce((s,b)=>s+b.amount,0);
  const totalExp=(S.expenses||[]).reduce((s,e)=>s+e.amount,0);
  const s0=[
    ['SUPREME LIMRA SOCIETY — COMPLETE DATA EXPORT'],
    ['Sr. No. 15/16, Inam Nagar, Kondhwa Khurd, Pune – 411048'],
    [`Export Date: ${new Date().toLocaleDateString('en-IN')} at ${new Date().toLocaleTimeString('en-IN')}`],
    [],
    ['SUMMARY','',''],
    ['Total Flats',S.flats.length,''],
    ['Total Bills Generated',S.bills.length,''],
    ['Total Collected (all time)','',totalCollected],
    ['Total Pending (all time)','',totalPending],
    ['Total Expenses (all time)','',totalExp],
    ['Net Balance (Collected - Expenses)','',totalCollected-totalExp],
  ];
  const ws0=XLSX.utils.aoa_to_sheet(s0);
  ws0['!cols']=[{wch:35},{wch:20},{wch:18}];
  ws0['!merges']=[{s:{r:0,c:0},e:{r:0,c:2}},{s:{r:1,c:0},e:{r:1,c:2}},{s:{r:2,c:0},e:{r:2,c:2}}];
  XLSX.utils.book_append_sheet(wb,ws0,'Summary');

  // ── Sheet 2: All Flats ──────────────────────────────────────────────────────
  const s1=[
    ['FLAT OWNERS LIST'],
    [`Total: ${S.flats.length} flats`],
    [],
    ['Flat No.','Owner Name','Mobile','Floor','Monthly (₹)','Type','Notes']
  ];
  sortedFlats.forEach(f=>{
    s1.push([f.flatNo,f.ownerName,f.mobile||'',f.floor||'',f.maintenance,f.maintenance===2000?'2BHK':'1BHK',f.notes||'']);
  });
  const ws1=XLSX.utils.aoa_to_sheet(s1);
  ws1['!cols']=[{wch:10},{wch:28},{wch:14},{wch:10},{wch:12},{wch:8},{wch:30}];
  ws1['!merges']=[{s:{r:0,c:0},e:{r:0,c:6}}];
  XLSX.utils.book_append_sheet(wb,ws1,'Flat Owners');

  // ── Sheet 3: Month-wise Collection Register ─────────────────────────────────
  // Get all unique year-months from bills
  const periods=[...new Set(S.bills.map(b=>`${b.year}-${String(b.month).padStart(2,'0')}`))].sort();
  const s2=[];
  s2.push(['MONTH-WISE COLLECTION REGISTER']);
  s2.push([]);
  // Header row: Flat | Name | [Month1 | Month2 | ...]
  const hdr=['Flat No.','Owner Name',...periods.map(p=>{const[y,m]=p.split('-');return MO[+m-1].slice(0,3)+'-'+y.slice(-2);}),'Total Paid','Pending'];
  s2.push(hdr);

  sortedFlats.forEach(f=>{
    const row=[f.flatNo,f.ownerName];
    let totalPaid=0,totalPend=0;
    periods.forEach(p=>{
      const[y,m]=p.split('-');
      const b=S.bills.find(x=>x.flatId===f.id&&x.year===+y&&x.month===+m);
      if(!b){row.push('');}
      else if(b.status==='paid'){row.push(b.amount);totalPaid+=b.amount;}
      else{row.push('PENDING');totalPend+=b.amount;}
    });
    row.push(totalPaid,totalPend);
    s2.push(row);
  });

  // Totals row
  const totalRow=['','TOTAL COLLECTED'];
  periods.forEach(p=>{
    const[y,m]=p.split('-');
    const col=S.bills.filter(b=>b.year===+y&&b.month===+m&&b.status==='paid').reduce((s,b)=>s+b.amount,0);
    totalRow.push(col);
  });
  totalRow.push(totalCollected,totalPending);
  s2.push([]);s2.push(totalRow);

  const ws2=XLSX.utils.aoa_to_sheet(s2);
  const colWidths=[{wch:10},{wch:28},...periods.map(()=>({wch:10})),{wch:12},{wch:12}];
  ws2['!cols']=colWidths;
  ws2['!merges']=[{s:{r:0,c:0},e:{r:0,c:periods.length+3}}];
  XLSX.utils.book_append_sheet(wb,ws2,'Monthly Collections');

  // ── Sheet 4: All Payments Detail ─────────────────────────────────────────────
  const s3=[
    ['ALL PAYMENT TRANSACTIONS'],
    [],
    ['Receipt No.','Flat No.','Owner Name','Month','Year','Amount (₹)','Payment Date','Mode','Generated Date']
  ];
  const paidBills=[...S.bills].filter(b=>b.status==='paid')
    .sort((a,b)=>a.year-b.year||a.month-b.month||+(a.receiptNo||0)-+(b.receiptNo||0));
  paidBills.forEach(b=>{
    const f=flatOf(b);
    s3.push(['#'+b.receiptNo,f.flatNo,f.ownerName,MO[b.month-1],b.year,b.amount,b.paidDate,b.paymentMode||'',b.generatedDate||'']);
  });
  s3.push([]);s3.push(['','','TOTAL','','',totalCollected,'','','']);
  const ws3=XLSX.utils.aoa_to_sheet(s3);
  ws3['!cols']=[{wch:12},{wch:10},{wch:28},{wch:12},{wch:8},{wch:12},{wch:14},{wch:14},{wch:14}];
  ws3['!merges']=[{s:{r:0,c:0},e:{r:0,c:8}}];
  XLSX.utils.book_append_sheet(wb,ws3,'All Payments');

  // ── Sheet 5: Outstanding Dues ─────────────────────────────────────────────
  const s4=[
    ['OUTSTANDING DUES REPORT'],
    [`As of: ${new Date().toLocaleDateString('en-IN')}`],
    [],
    ['Flat No.','Owner Name','Mobile','Months Pending','Oldest Due','Total Due (₹)']
  ];
  const defaulters=sortedFlats.map(f=>{
    const pb=S.bills.filter(b=>b.flatId===f.id&&b.status==='pending');
    const oldest=pb.sort((a,b)=>a.year-b.year||a.month-b.month)[0];
    return{f,months:pb.length,oldest,total:pb.reduce((s,b)=>s+b.amount,0)};
  }).filter(x=>x.months>0);

  if(defaulters.length===0){
    s4.push(['No outstanding dues — All cleared!','','','','','']);
  } else {
    defaulters.sort((a,b)=>b.total-a.total).forEach(d=>{
      s4.push([d.f.flatNo,d.f.ownerName,d.f.mobile||'',d.months,d.oldest?MO[d.oldest.month-1]+' '+d.oldest.year:'',d.total]);
    });
    s4.push([]);
    s4.push(['','TOTAL OUTSTANDING','','',`${defaulters.length} flats`,defaulters.reduce((s,d)=>s+d.total,0)]);
  }
  const ws4=XLSX.utils.aoa_to_sheet(s4);
  ws4['!cols']=[{wch:10},{wch:28},{wch:14},{wch:14},{wch:14},{wch:14}];
  ws4['!merges']=[{s:{r:0,c:0},e:{r:0,c:5}},{s:{r:1,c:0},e:{r:1,c:5}}];
  XLSX.utils.book_append_sheet(wb,ws4,'Outstanding Dues');

  // ── Sheet 6: All Expenses ─────────────────────────────────────────────────
  const s5=[
    ['ALL SOCIETY EXPENSES'],
    [],
    ['Sr.','Date','Month','Year','Category','Description','Amount (₹)','Notes']
  ];
  const sortedExp=[...(S.expenses||[])].sort((a,b)=>new Date(a.date)-new Date(b.date));
  sortedExp.forEach((e,i)=>{
    const d=new Date(e.date);
    s5.push([i+1,d.toLocaleDateString('en-IN'),MO[d.getMonth()],d.getFullYear(),e.category,e.description,e.amount,e.notes||'']);
  });
  s5.push([]);s5.push(['','','','','','TOTAL',totalExp,'']);

  // Category breakdown
  s5.push([]);s5.push(['Category Breakdown','','','','','','','']);
  const cats={};sortedExp.forEach(e=>{cats[e.category]=(cats[e.category]||0)+e.amount;});
  Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([c,a])=>{
    s5.push(['',c,'','','','',a,'']);
  });

  const ws5=XLSX.utils.aoa_to_sheet(s5);
  ws5['!cols']=[{wch:6},{wch:14},{wch:12},{wch:8},{wch:18},{wch:35},{wch:12},{wch:30}];
  ws5['!merges']=[{s:{r:0,c:0},e:{r:0,c:7}}];
  XLSX.utils.book_append_sheet(wb,ws5,'All Expenses');

  // ── Download ──────────────────────────────────────────────────────────────
  const fname=`SupremeLimra_FullExport_${new Date().toLocaleDateString('en-IN').replace(/\//g,'-')}.xlsx`;
  XLSX.writeFile(wb,fname);
  showToast('Full data Excel downloaded ✓','ok');
}

// ════════════════════════════════════════════════════
// EVENT HANDLER
// ════════════════════════════════════════════════════
document.addEventListener('click',function(e){
  // Close modal when clicking the dark overlay background (not the modal card itself)
  if(e.target.id==='modal-ov'){S.modal=null;render();return;}

  const el=e.target.closest('[data-action]');
  if(!el)return;
  const a=el.dataset.action,id=el.dataset.id||'';
  
  if(a==='login'){
    const pin=document.getElementById('pin-input')?.value||'';
    if(pin===LS.getPin()){LS.login();render();}
    else{const err=document.getElementById('pin-err');if(err){err.textContent='Wrong PIN. Try again.';setTimeout(()=>{err.textContent='';},2000);}}
    return;
  }
  if(a==='logout'){if(confirm('Logout from the app?')){LS.logout();render();} return;}
  if(a==='do-pin-login'){
    const pin=document.getElementById('pin-input')?.value||'';
    const btn=e.target.closest('[data-action="do-pin-login"]');
    if(DB.doLogin(pin)){
      if(btn){btn.textContent='Loading…';btn.disabled=true;}
      (async()=>{await loadData();render();})();
    } else {
      const err=document.getElementById('pin-err');
      if(err){err.textContent='Wrong PIN. Try again.';setTimeout(()=>{err.textContent='';},2000);}
    }
    return;
  }
  if(a==='tab'){S.tab=el.dataset.tab;S.modal=null;render();return;}
  if(a==='change-admin-pin-open'){
    if(!DB.isAdmin()){S.modal={type:'adminAuth',data:{next:'change-admin-pin-open'}};render();return;}
    S.modal={type:'changeAdminPin'};render();return;
  }
  if(a==='do-change-admin-pin'){
    const old=document.getElementById('adm-old')?.value||'';
    const nw=document.getElementById('adm-new')?.value||'';
    const cfm=document.getElementById('adm-cfm')?.value||'';
    const err=document.getElementById('adm-err');
    if(old!==DB.getAdminPin()){if(err)err.textContent='Current admin PIN is wrong';return;}
    if(!nw||nw.length<4){if(err)err.textContent='PIN must be at least 4 digits';return;}
    if(nw!==cfm){if(err)err.textContent='PINs do not match';return;}
    DB.setAdminPin(nw);showToast('Admin PIN updated ✓');S.modal=null;render();return;
  }
  if(a==='do-admin-auth'){
    const pin=document.getElementById('admin-pin-input')?.value||'';
    const next=el.dataset.next||'';
    if(DB.adminLogin(pin)){
      S.modal=null;render();
      // Re-fire the original action now that admin is authenticated
      setTimeout(()=>{
        const fakeEl=document.querySelector('[data-action="'+next+'"]');
        if(fakeEl)fakeEl.click();
        else{
          // For import-trigger, directly trigger file input
          if(next==='import-trigger')document.getElementById('import-file')?.click();
        }
      },100);
    } else {
      const err=document.getElementById('admin-pin-err');
      if(err){err.textContent='Wrong Admin PIN';setTimeout(()=>err.textContent='',2000);}
    }
    return;
  }
  if(a==='close-modal'){S.modal=null;S._autoWA=false;render();return;}
  
  // Flat actions
  if(a==='flat-history'){const f=S.flats.find(x=>x.id===id);if(f){S.modal={type:'flatHistory',data:f};render();}return;}
  if(a==='add-flat'){S.modal={type:'flatForm',data:null};render();return;}
  if(a==='edit-flat'){S.modal={type:'flatForm',data:S.flats.find(f=>f.id===id)};render();return;}
  if(a==='del-flat'){if(confirm('Delete this flat and all its bills?')){S.flats=S.flats.filter(f=>f.id!==id);S.bills=S.bills.filter(b=>b.flatId!==id);saveFlats();saveBills();showToast('Flat deleted');}return;}
  if(a==='save-flat'){
    const no=document.getElementById('ff-no')?.value.trim();
    const name=document.getElementById('ff-name')?.value.trim();
    const mob=document.getElementById('ff-mob')?.value.trim();
    const floor=document.getElementById('ff-floor')?.value.trim();
    const maint=+(document.getElementById('ff-maint')?.value||1000);
    if(!no){alert('Flat number required');return;}
    if(!name){alert('Owner name required');return;}
    const notes=document.getElementById('ff-notes')?.value.trim();
    const data={flatNo:no,ownerName:name,mobile:mob,floor,maintenance:maint,notes};
    if(id){S.flats=S.flats.map(f=>f.id===id?{...data,id}:f);showToast('Flat updated ✓');}
    else{S.flats.push({...data,id:uid()});showToast('Flat added ✓');}
    saveFlats();S.modal=null;render();return;
  }
  
  // Bills
  if(a==='open-gen'){S.modal={type:'genBills'};render();return;}
  if(a==='do-gen'){
    const m=+(document.getElementById('gen-month')?.value||S.bf.month);
    const y=+(document.getElementById('gen-year')?.value||S.bf.year);
    const todayM=now.getMonth()+1, todayY=now.getFullYear();
    // LOCK: only current month allowed
    if(m!==todayM||y!==todayY){
      alert('⚠️ Bills can only be generated for the current month ('+MO[todayM-1]+' '+todayY+').\n\nPrevious or future month bills are not allowed.');
      return;
    }
    const wa=document.getElementById('gen-wa')?.checked;
    const existingIds=new Set(S.bills.filter(b=>b.month===m&&b.year===y).map(b=>b.flatId));
    const nf=S.flats.filter(f=>!existingIds.has(f.id));
    if(!nf.length){showToast('Bills already generated for all flats this month','err');return;}
    if(!confirm('Generate '+MO[m-1]+' '+y+' bills for '+nf.length+' flat'+(nf.length>1?'s':'')+' ?')){return;}
    const nb=nf.map(f=>({id:uid(),flatId:f.id,month:m,year:y,amount:f.maintenance,status:'pending',receiptNo:null,paidDate:null,paymentMode:null,generatedDate:new Date().toLocaleDateString('en-IN')}));
    S.bills=[...S.bills,...nb];saveBills();S.bf.month=m;S.bf.year=y;
    if(wa){const eligible=nb.filter(b=>flatOf(b).mobile);if(eligible.length){S.modal={type:'waFlow',data:{bills:eligible,step:'send',idx:0,done:[]}};showToast(nb.length+' bills generated ✓');render();return;}}
    showToast(nb.length+' bills generated ✓');S.modal=null;render();return;
  }
  if(a==='edit-bill-charges'){
    const b=S.bills.find(x=>x.id===id);
    if(b){S.modal={type:'billCharges',data:b};render();}
    return;
  }
  if(a==='add-extra-row'){
    // Add empty row to the extras list
    const b=S.modal?.data;
    if(!b)return;
    if(!b.extras)b.extras=[];
    b.extras.push({description:'',amount:0});
    S.modal={type:'billCharges',data:b};render();
    return;
  }
  if(a==='quick-extra'){
    const b=S.modal?.data;
    if(!b)return;
    if(!b.extras)b.extras=[];
    b.extras.push({description:el.dataset.desc||'',amount:0});
    S.modal={type:'billCharges',data:b};render();
    return;
  }
  if(a==='remove-extra'){
    const b=S.modal?.data;
    if(!b)return;
    const idx2=+(el.dataset.idx||0);
    b.extras=(b.extras||[]).filter((_,i)=>i!==idx2);
    // recalculate total
    const base=b.maintenance_base||(flatOf(b).maintenance)||1000;
    const extraTotal=(b.extras||[]).reduce((s,e)=>s+e.amount,0);
    b.amount=base+extraTotal;
    S.modal={type:'billCharges',data:b};render();
    return;
  }
  if(a==='save-bill-charges'){
    const b=S.bills.find(x=>x.id===id);
    if(!b)return;
    // Read all extra rows from DOM
    const extras=[];
    let i=0;
    while(true){
      const d=document.getElementById('ext-desc-'+i);
      const amt=document.getElementById('ext-amt-'+i);
      if(!d)break;
      const desc=d.value.trim();
      const amount=+(amt?.value||0);
      if(desc&&amount>0)extras.push({description:desc,amount});
      i++;
    }
    const base=b.maintenance_base||flatOf(b).maintenance||1000;
    const extraTotal=extras.reduce((s,e)=>s+e.amount,0);
    const newAmt=base+extraTotal;
    const updated={...b,extras,maintenance_base:base,amount:newAmt};
    S.bills=S.bills.map(x=>x.id===id?updated:x);
    saveBills();
    S.modal=null;
    showToast('Bill updated — Total: '+fmt(newAmt),'ok');
    render();
    return;
  }
  if(a==='open-pay'){const b=S.bills.find(x=>x.id===id);if(b){S.modal={type:'payment',data:b};render();}return;}
  if(a==='do-pay'){
    const b=S.bills.find(x=>x.id===id);if(!b)return;
    const amt=+(document.getElementById('pay-amt')?.value||0);
    const date=document.getElementById('pay-date')?.value;
    const mode=document.getElementById('pay-mode')?.value||'Cash';
    if(!amt){alert('Enter amount');return;}
    // Safe receipt number — use max existing + 1, padded
    const maxRcpt=S.bills.reduce((mx,b)=>Math.max(mx,+(b.receiptNo||0)),0);
    const newRcptNo=String(maxRcpt+1).padStart(4,'0');
    const updated={...b,status:'paid',amount:amt,paidDate:new Date(date).toLocaleDateString('en-IN'),paymentMode:mode,receiptNo:newRcptNo};
    S.bills=S.bills.map(x=>x.id===id?updated:x);
    // Set modal FIRST, render BEFORE saving to Firebase
    // This prevents Firebase onSnapshot from firing mid-render and clearing modal
    S.modal={type:'receipt',data:updated};
    S._autoWA=!!(flatOf(updated).mobile);
    S._pdfUrl=null;
    S._pdfUploading=false; // Don't auto-upload on every payment
    render();
    showToast('Payment recorded ✓');
    // Save to localStorage immediately (sync)
    DB.lset('slimra_bills_v2',S.bills);
    // Save to Firebase in background — don't await
    if(FB_READY&&_fbFS&&_fbAuth?.currentUser){
      _fbFS.collection('society').doc('bills')
        .set({list:S.bills,updated:new Date().toISOString()})
        .catch(e=>console.log('Bills save:',e));
    }
    return;
  }
  if(a==='open-receipt'){
    const b=S.bills.find(x=>x.id===id);
    if(b){
      S.modal={type:'receipt',data:b};
      S._pdfUrl=null;S._pdfUploading=true;
      render();
      if(FB_READY&&_fbST){
        const _ut=setTimeout(()=>{S._pdfUploading=false;updateReceiptHint();},8000);
        uploadReceiptAndGetLink(b,flatOf(b))
          .then(url=>{clearTimeout(_ut);S._pdfUrl=url;S._pdfUploading=false;updateReceiptHint();})
          .catch(()=>{clearTimeout(_ut);S._pdfUploading=false;updateReceiptHint();});
      } else {S._pdfUploading=false;}
    }
    return;}
  if(a==='print-pdf'){const b=S.bills.find(x=>x.id===id)||S.modal?.data;if(b){printPDF(b,flatOf(b));showToast('Opening PDF…','pdf');}return;}
  
  // WhatsApp
  if(a==='send-all-reminders'){
    const m=S.bf.month,y=S.bf.year;
    const pendBills=S.bills.filter(b=>b.month===m&&b.year===y&&b.status==='pending');
    const eligible=pendBills.filter(b=>flatOf(b).mobile);
    if(!eligible.length){showToast('No pending bills with mobile numbers','err');return;}
    S.modal={type:'waFlow',data:{bills:eligible,step:'send',idx:0,done:[],msgType:'reminder'}};render();return;
  }
  if(a==='wa-remind'){
    const b=S.bills.find(x=>x.id===id);
    if(b){
      const f=flatOf(b);
      if(!f.mobile){showToast('No mobile number for this flat','err');return;}
      // Use bill month to calculate days since bill start date
      // If generatedDate exists, use it; else use 1st of bill month
      let daysLate=0;
      try{
        let fromDate;
        if(b.generatedDate){
          const parts=b.generatedDate.split('/');
          if(parts.length===3) fromDate=new Date(+parts[2],+parts[1]-1,+parts[0]);
        }
        if(!fromDate||isNaN(fromDate)) fromDate=new Date(b.year,b.month-1,1);
        daysLate=Math.floor((new Date()-fromDate)/(1000*60*60*24));
        if(daysLate<1)daysLate=1;
      }catch(e){daysLate=1;}
      goToWA(f.mobile,waOverdueReminder(f,b));
      showToast('Opening WhatsApp reminder…','wa');
    }
    return;
  }
  if(a==='wa-bill'){const b=S.bills.find(x=>x.id===id);if(b){const f=flatOf(b);goToWA(f.mobile,waMsg(f,b));showToast('Opening WhatsApp…','wa');}return;}
  if(a==='wa-open-now'){const b=S.bills.find(x=>x.id===id)||S.modal?.data?.bill;if(b){const f=flatOf(b);S.modal=null;render();setTimeout(()=>{openWA(f.mobile,waRcpt(f,b));},300);}return;}
  if(a==='wa-rcpt'){
    // Best quality: use Firebase PDF download link (no WhatsApp compression)
    if(S._pdfUrl){
      const b2=S.bills.find(x=>x.id===id)||S.modal?.data;
      if(b2){const f2=flatOf(b2);goToWA(f2.mobile,waRcptWithLink(f2,b2,S._pdfUrl));showToast('Opening WhatsApp with PDF link ✓','wa');return;}
    }const b=S.bills.find(x=>x.id===id)||S.modal?.data;if(b){const f=flatOf(b);shareReceiptOnWA(b,f);}return;}
  if(a==='bulk-wa'){
    const pend=S.bills.filter(b=>b.month===S.bf.month&&b.year===S.bf.year&&b.status==='pending'&&flatOf(b).mobile);
    if(!pend.length){showToast('No pending bills with mobile numbers','err');return;}
    S.modal={type:'waFlow',data:{bills:pend,step:'send',idx:0,done:[]}};render();return;
  }
  if(a==='wa-start'){if(S.modal?.data){S.modal.data.step='send';S.modal.data.idx=0;S.modal.data.done=[];}render();return;}
  if(a==='wa-next'){
    const d=S.modal?.data;if(!d)return;
    if(d.idx>=d.bills.length)return;
    const bill=d.bills[d.idx];const f=flatOf(bill);
    const msgFn=d.msgType==='reminder'?waReminder:waMsg;
    // Use direct goToWA — opens WhatsApp straight to contact
    goToWA(f.mobile,msgFn(f,bill));
    d.done=[...d.done,bill.id];d.idx++;
    render();return;
  }
  
  // Settings
  if(a==='change-pin'){if(!DB.isAdmin()){S.modal={type:'adminAuth',data:{next:'change-pin'}};render();return;}S.modal={type:'changePin'};render();return;}
  if(a==='do-change-pin'){
    const old=document.getElementById('pin-old')?.value;
    const nw=document.getElementById('pin-new')?.value;
    const cfm=document.getElementById('pin-cfm')?.value;
    const err=document.getElementById('pin-change-err');
    if(old!==DB.getPin()){if(err)err.textContent='Current PIN is wrong.';return;}
    if(!nw||nw.length<4){if(err)err.textContent='New PIN must be at least 4 digits.';return;}
    if(nw!==cfm){if(err)err.textContent='PINs do not match.';return;}
    LS.setPin(nw);showToast('PIN changed successfully ✓');S.modal=null;render();return;
  }
  if(a==='add-expense'){S.modal={type:'addExpense',data:{cat:'',desc:''}};render();return;}
  if(a==='quick-expense'){S.modal={type:'addExpense',data:{cat:el.dataset.cat||'',desc:''}};render();return;}
  if(a==='save-expense'){
    const cat=document.getElementById('exp-cat')?.value||'';
    const desc=document.getElementById('exp-desc')?.value.trim();
    const amt=+(document.getElementById('exp-amt')?.value||0);
    const date=document.getElementById('exp-date')?.value;
    const note=document.getElementById('exp-note')?.value.trim();
    if(!cat){alert('Please select a category');return;}
    if(!desc){alert('Description required');return;}
    if(!amt||amt<=0){alert('Enter a valid amount');return;}
    if(!S.expenses)S.expenses=[];
    S.expenses.push({id:uid(),description:desc,amount:amt,date,category:cat,notes:note,addedDate:new Date().toISOString()});
    saveExpenses();showToast('Expense saved ✓');S.modal=null;render();return;
  }
  if(a==='undo-payment'){
    const b=S.bills.find(x=>x.id===id);
    if(!b||b.status!=='paid'){showToast('Bill not found or already pending','err');return;}
    const f=flatOf(b);
    if(!confirm('Undo payment for '+f.ownerName+' — Flat '+f.flatNo+'\n'+MO[b.month-1]+' '+b.year+' · ₹'+b.amount+'/-?\n\nThis will remove the receipt and mark it as pending again.')){return;}
    const reverted={...b,status:'pending',amount:f.maintenance||b.amount,paidDate:null,paymentMode:null,receiptNo:null};
    S.bills=S.bills.map(x=>x.id===id?reverted:x);
    saveBills();
    S.modal=null;S._autoWA=false;
    showToast('Payment undone — marked as pending ✓','ok');
    render();return;
  }
  if(a==='del-expense'){if(!confirm('Delete this expense?'))return;S.expenses=(S.expenses||[]).filter(e=>e.id!==id);saveExpenses();showToast('Expense deleted');render();return;}
  if(a==='gen-monthly-excel'||a==='open-monthly-excel'){openMonthlyExcelModal();return;}
  if(a==='show-install'){S.modal={type:'installGuide'};render();return;}
  if(a==='export-full-excel'){generateFullDataExcel();return;}
  if(a==='gen-defaulter-pdf'){generateDefaulterPDF();return;}
  if(a==='do-gen-excel'){const m=+(document.getElementById('xls-month')?.value||new Date().getMonth()+1);const y=+(document.getElementById('xls-year')?.value||new Date().getFullYear());S.modal=null;render();setTimeout(()=>generateMonthlyExcel(m,y),200);return;}
  if(a==='clear-all-bills'){if(!DB.isAdmin()){S.modal={type:'adminAuth',data:{next:'clear-all-bills'}};render();return;}
    if(confirm('⚠️ This will DELETE ALL '+S.bills.length+' bills permanently.\n\nThis cannot be undone. Are you sure?')){
      if(confirm('FINAL WARNING: Delete all bills and start fresh from '+MO[now.getMonth()]+' '+now.getFullYear()+'?')){
        S.bills=[];saveBills();S.modal=null;
        showToast('All bills cleared. Generate fresh for '+MO[now.getMonth()]+' '+now.getFullYear(),'ok');
        render();
      }
    }
    return;
  }
  if(a==='export-data'){if(!DB.isAdmin()){S.modal={type:'adminAuth',data:{next:'export-data'}};render();return;}exportData();return;}
  if(a==='import-trigger'){if(!DB.isAdmin()){S.modal={type:'adminAuth',data:{next:'import-trigger'}};render();return;}document.getElementById('import-file')?.click();return;}
});
